function loadBillingExcel(input){
  var file=input.files&&input.files[0];
  if(!file) return;
  var log=document.getElementById('jsup-log');
  if(log) log.innerHTML+='<br>⏳ กำลังอ่าน Excel: '+file.name+'...';

  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var data=new Uint8Array(e.target.result);
      var wb=XLSX.read(data,{type:'array',cellDates:true});
      var billMap={};
      var excelRows={}; // bn → {bn,bd,net,cu,sa,br}
      var excelMoNet={}; // 'YYYY-MM' → net sum (for Monthly Forecast)
      wb.SheetNames.forEach(function(shName){
        var ws=wb.Sheets[shName];
        var rows=XLSX.utils.sheet_to_json(ws,{header:1,raw:true});
        // debug: log first few rows
        if(true){
          console.log('[BillExcel] Sheet:',shName,'rows:',rows.length,'header row1:',rows[1]&&rows[1].slice(0,6).map(function(c){return c;}));
          rows.slice(2,4).forEach(function(r,ri){ console.log('[BillExcel] sample row'+ri+':',r.slice(0,6)); });
          // log CN rows
          rows.slice(2).forEach(function(r){
            var net2=parseFloat(r[21]||0)||0;
            if(net2<0) console.log('[BillExcel] CN row: BN='+r[5]+' net='+net2+' date='+r[4]);
          });
        }
        rows.slice(2).forEach(function(row){
          var bd=row[4];
          var bn=String(row[5]||'').trim().replace(/\.0$/,'');
          var _rawNet=row[21];
          var net=(_rawNet!=null&&_rawNet!=='')?parseFloat(_rawNet):0;
          if(!bn||!bd) return;
          var bdStr='';
          if(bd instanceof Date){
            // XLSX cellDates:true → Date object (local timezone)
            var _y=bd.getFullYear(), _m=String(bd.getMonth()+1).padStart(2,'0'), _dd=String(bd.getDate()).padStart(2,'0');
            bdStr=_y+'-'+_m+'-'+_dd;
          } else if(typeof bd==='number'){ 
            var _d=new Date(Math.round((bd-25569)*86400*1000));
            var _y=_d.getUTCFullYear(), _m=String(_d.getUTCMonth()+1).padStart(2,'0'), _dd=String(_d.getUTCDate()).padStart(2,'0');
            bdStr=_y+'-'+_m+'-'+_dd;
          } else if(typeof bd==='string') bdStr=bd.slice(0,10);
          if(!bn||!bdStr) return;
          billMap[bn]=bdStr;
          // แยก key สำหรับ CN rows (net<0) เพื่อไม่ให้ sum กับ positive rows
          var rowKey=net<0?('CN_'+bn+'_'+bdStr):bn;
          if(!excelRows[rowKey]){
            excelRows[rowKey]={bn:bn,bd:bdStr,net:0,gross:0,
              cu:String(row[9]||''),sa:String(row[18]||''),br:String(row[14]||''),
              sheet:shName,isCN:net<0};
          }
          excelRows[rowKey].net+=net;
          excelRows[rowKey].gross+=Math.abs(net);
          // สะสม net per month (YYYY-MM)
          var moKey=bdStr.slice(0,7);
          excelMoNet[moKey]=(excelMoNet[moKey]||0)+net;
        });
      });
      _billingMapCache_rows=excelRows;
      _billingMapCache_moNet=excelMoNet;
      var totalBill=Object.keys(billMap).length;
      _billingMapCache=billMap;
      if(log) log.innerHTML+='<br>📊 Excel พร้อม: '+totalBill+' BNs';
    }catch(err){
      if(log) log.innerHTML+='<br>❌ อ่าน Excel ไม่ได้: '+err.message;
      console.error(err);
    }
  };
  reader.readAsArrayBuffer(file);
}

function applyBillingExcel(billMap){
  _billingMapCache=billMap;
  if(!D||!D.length){ return 0; }
  var updated=0, skipped=0;
  var exRows=_billingMapCache_rows||{};

  // หา BNs ที่มีใน D ก่อน modify
  var jsBnSet={};
  D.forEach(function(r){ if(r.bn) jsBnSet[String(r.bn).trim().replace(/\.0$/,'')]=1; });

  // ลบ Excel-only rows เก่าออก
  for(var di=D.length-1;di>=0;di--){ if(D[di]._excel_only) D.splice(di,1); }

  // เพิ่ม Excel-only rows (มีใน Excel ไม่มีใน JS)
  _excelOnlyRows=[];
  var _uid_xl=Date.now();
  // สร้าง bn→sa map จาก D (JS records) ก่อน push excel-only
  var _jsBnSaMap={};
  D.forEach(function(r){ if(r.bn&&r.sa) _jsBnSaMap[String(r.bn).trim()]=r.sa; });

  Object.values(exRows).forEach(function(xr){
    if(jsBnSet[xr.bn]&&!xr.isCN) return; // CN rows → เสมอเป็น Excel-only
    _excelOnlyRows.push(xr);
    // xr.bd อาจเป็น Date object หรือ string ISO
    var _bdVal=xr.bd instanceof Date?xr.bd.toISOString().slice(0,10):String(xr.bd||'').slice(0,10);
    var d=new Date(_bdVal+'T00:00:00');
    var newMo=!isNaN(d.getTime())?d.getMonth()+1:CUR_MO;
    var newYr=!isNaN(d.getTime())?d.getFullYear():CUR_YR;
    var xNet=(xr.net!=null&&xr.net!=='')?Number(xr.net):0;

  // update matched records
  D.forEach(function(r){
    if(r._excel_only) return;
    var bn=String(r.bn||'').trim().replace(/\.0$/,'');
    if(!bn) return;

      // BN ไม่อยู่ใน Excel → ไม่แตะ record เดิม ปล่อย status เดิมไว้
      r._excel_mapped=0; r._search=null;

    }
    // อัพเดทเฉพาะ status, bd, mo/yr — ไม่แตะ r.px (BILL_PRICE ถูกต้องอยู่แล้ว)
    r.bd=newBd; r._excel_mapped=1;
    // ดู net จาก positive row ปกติ
    var _exRow=exRows[bn];
    var _netSum=_exRow?Number(_exRow.net||0):null;
    // ตรวจว่ามี CN row ใน exRows สำหรับ BN นี้ไหม
    var _cnKey=Object.keys(exRows).find(function(k){ return k.indexOf('CN_'+bn+'_')===0; });
    var _cnRow=_cnKey?exRows[_cnKey]:null;
    var _isCN=false; // D record ที่ match BN = Actual FAD ปกติ เสมอ
    r.st='Actual FAD';
    r.ip=(r.t==='SP')?'SP Billed':'SC Billed';
    r.is_cn=0;
    r._net_excel=_netSum||null;
    // ถ้ามี CN row → สร้าง CN record แยก (จะถูกสร้างใน Excel-only loop แล้ว)
    // CN: แสดง gross (ยอดก่อน offset)
    if(_isCN&&exRows[bn]&&Number(exRows[bn].gross||0)>0){
      r.px=Number(exRows[bn].gross)*1.07;
    }
    // Actual FAD: ไม่แตะ r.px — ใช้ r._net_excel แทนใน statusbar/forecast
    r._search=null;
    var d=new Date(newBd);
    if(!isNaN(d.getTime())){
      r.mo=d.getMonth()+1; r.yr=d.getFullYear();
      r.fmo=r.mo; r.fyr=r.yr;
    }
    updated++;

  // debug

  try{ buildSummary(); af(); }catch(e){ console.error('apply:',e); }
  try{ if(typeof renderBVF==='function'){ var c2=document.querySelector('.view.on'); if(c2&&c2.id==='v-bvf') renderBVF(); }}catch(e){}

  return updated;
}

// Fuzzy match customer name → find sales
function _fuzzyFindSales(cuExcel){
  if(!cuExcel) return 'Unknown';
  var _map=(typeof _SC_CU_SA_MAP!=='undefined'&&Object.keys(_SC_CU_SA_MAP).length)?_SC_CU_SA_MAP:null;
  if(!_map) return 'Unknown';
  var _strip=function(s){
    return String(s||'')
      .replace(/บริษัท|ห้างหุ้นส่วน(จำกัด)?|มูลนิธิ|สมาคม|องค์การ|โรงพยาบาล|คณะแพทยศาสตร์|มหาวิทยาลัย|สำนักงาน|ศูนย์การแพทย์|ศูนย์|คลินิก|คลีนิก/g,'')
      .replace(/จำกัด(มหาชน)?|มหาชน|\([^)]*\)/g,'')
      .replace(/\s+/g,' ').trim().toLowerCase();
  };
  var cu=_strip(cuExcel);
  if(cu.length<3) return 'Unknown';
  var best='', bestScore=0;
  Object.keys(_map).forEach(function(rcu){
    var sa=_map[rcu];
    var rc=_strip(rcu);
    if(!rc||rc.length<3) return;
    var score=0;
    // exact match หรือ contains ทั้งคำ (ไม่ใช่ substring กลางคำ)
    if(rc===cu){ score=cu.length*2; }
    else if(rc.indexOf(cu)>=0||cu.indexOf(rc)>=0){ score=Math.min(cu.length,rc.length); }
    if(score>bestScore){ bestScore=score; best=sa; }
  });
  // ต้อง score >= 4 เพื่อกันการ match ผิด
  return bestScore>=4?best:'Unknown';
}
window._fuzzyFindSales=_fuzzyFindSales;

// ── Cancel Manual Edit: กลับ status เดิมก่อน override ──
function cancelManualEdit(rid){
  if(rid==null) return;
  // หา record เฉพาะแถว (ด้วย id) — ถ้าหาด้วย id ไม่เจอ fallback qn (ข้อมูลเก่า)
  var _rec=D.find(function(d){return String(d.id)===String(rid);});
  var _qnDisp = _rec ? (_rec.qn||_rec.sr||'') : String(rid);
  if(!confirm('ยกเลิก override status สำหรับ '+_qnDisp+' และกลับไป Status เดิม?')) return;
  // คำนวณ rowKey ของแถวนี้ (เหมือนตอน save)
  var _rowKey = _rec ? ((_rec.qn||_rec.sr||'')+'|'+(_rec.bn?('B'+_rec.bn):((_rec.rbmo||0)+'-'+(_rec.rbyr||0)))) : '';
  // หา record + restore _orig_st (เฉพาะแถวที่ id ตรง)
  var restored=false;
  D.forEach(function(r){
    if(String(r.id)===String(rid) && r._manual_edit && r._orig_st){
      r.st=r._orig_st;
      if(r._orig_mo!=null) r.mo=r._orig_mo;
      if(r._orig_yr!=null) r.yr=r._orig_yr;
      if(r._orig_fmo!=null) r.fmo=r._orig_fmo;
      if(r._orig_fyr!=null) r.fyr=r._orig_fyr;
      if(r._orig_ip!=null) r.ip=r._orig_ip;
      delete r._manual_edit;
      delete r._orig_st;
      delete r._orig_mo; delete r._orig_yr;
      delete r._orig_fmo; delete r._orig_fyr;
      delete r._orig_ip;
      r._search=null;
      restored=true;
    }
  });
  if(!restored){ return; }
  // re-render UI
  try{ buildSummary(); af(); }catch(e){}
  // close detail panel
  try{ var ov=document.getElementById('dp-overlay'); if(ov) ov.classList.remove('open'); }catch(e){}
  // save cancel to backend (mark Cancelled in sheet)
  try {
    if (typeof google !== 'undefined' && google.script && google.script.run) {
      var _payload = [{
        qn: _qnDisp,
        rowKey: _rowKey,
        editorId: (typeof _currentUser!=='undefined'&&_currentUser)?_currentUser.empId:'',
        editorName: (typeof _currentUser!=='undefined'&&_currentUser)?_currentUser.name:''
      }];
      google.script.run
        .withSuccessHandler(function(){})
        .withFailureHandler(function(){})
        .cancelManualEdit(JSON.stringify(_payload));
    }
  } catch(e) {}
}
window.cancelManualEdit=cancelManualEdit;

function populateIP(){
  var drop=document.getElementById('f-ip-drop');
  if(!drop) return;
  var seen={};
  (D||[]).forEach(function(r){ var v=String(r.ip||'').trim(); if(v && !seen[v]) seen[v]=1; });
  // [v175] เรียง IP ตามลำดับ status flow (Quick Filter) — IP นอกลิสต์เรียง A-Z ต่อท้าย
  var _IP_ORDER=['Waiting PM','PM Completed','Cancel PM','Waiting Bill','SC Billing','รอดำเนินการออกบิล','SC Billed','SC Pending','SP Billing','RP:Wait Stock-In','RP:Stock In','RP:Processing','SC:Data Issue','SP:Data Issue'];
  var keys=Object.keys(seen).sort(function(a,b){
    var ia=_IP_ORDER.indexOf(a), ib=_IP_ORDER.indexOf(b);
    if(ia<0&&ib<0) return a<b?-1:(a>b?1:0); // ทั้งคู่นอกลิสต์ -> A-Z
    if(ia<0) return 1;  // a นอกลิสต์ -> ท้าย
    if(ib<0) return -1;
    return ia-ib;
  });
  // เก็บ "เลือกทั้งหมด/ล้าง" บรรทัดแรก แล้ว rebuild labels
  var head='<div onclick="ipSelectAll()" style="padding:5px 12px;font-size:11px;cursor:pointer;color:var(--ac2);border-bottom:1px solid var(--bd)">✓ เลือกทั้งหมด / ล้าง</div>';

var _bvfTeamExpand=false;
function toggleBvfTeam(){ _bvfTeamExpand=!_bvfTeamExpand; renderBVF(); }

function renderBVF(){
  var wrap=document.getElementById('bvf-wrap');
  if(!wrap) return;
  var MO_TH=['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
  var CY=typeof CUR_YR!=='undefined'?CUR_YR:2026;
  var CM=typeof CUR_MO!=='undefined'?CUR_MO:new Date().getMonth()+1;
  var TMS=['Service 1','Service 2','Service 3'];
  function fM(v){ return v>=1e6?(v/1e6).toFixed(2)+'M':v>=1e3?(v/1e3).toFixed(0)+'K':'0'; }
  function fAmt(v){ return '฿'+Number(v||0).toLocaleString('en-US',{maximumFractionDigits:0}); }
  function fmt(v,isDiff){
    if(v===null||v===undefined||v==='') return '<span style="color:var(--mu2)">-</span>';
    var n=Number(v); if(!isFinite(n)) return String(v||'');
    var s=n.toLocaleString('en-US',{maximumFractionDigits:0});
    if(isDiff&&n>0) s='+'+s;
    var color=isDiff?(n>0?'var(--grn)':(n<0?'var(--red)':'var(--tx)')):'var(--tx)';
    return '<span style="color:'+color+'">'+s+'</span>';
  }

  // Budget per team per type per month
  var budByMo=new Array(12).fill(0);
  var budTmTp={}; // tm → tp → [12]
  TMS.forEach(function(tm){
    budTmTp[tm]={SC:new Array(12).fill(0),SP:new Array(12).fill(0)};
    if(typeof BUD!=='undefined'&&BUD&&BUD[tm]){
      ['SC','SP'].forEach(function(tp){
        if(BUD[tm][tp]) for(var i=0;i<12;i++){
          var v=(BUD[tm][tp][i]||0)*1000;
          budByMo[i]+=v; budTmTp[tm][tp][i]=v;
        }
      });
    }
  });

  // Actual FAD + Forecast per month
  var actByMo=new Array(12).fill(0), fcByMo=new Array(12).fill(0);
  var actTm={}, fcTm={};
  TMS.forEach(function(tm){ actTm[tm]=new Array(12).fill(0); fcTm[tm]=new Array(12).fill(0); });
  function tmNorm(r){ var g=(typeof getTeam==='function')?getTeam(r):r.tm||''; return g?g.replace('-',' '):null; }

  if(typeof D!=='undefined'&&D){
    D.forEach(function(r){
      if(r.yr!==CY) return;
      var mo=r.mo; if(!mo||mo<1||mo>12) return;
      var exv=r._net_excel!=null?Number(r._net_excel):(r.px?r.px/1.07:0);
      var isAct=(r.st==='Actual FAD'||r.st==='Actual FAD (CN)'||r.st==='Actual FAD (Not Found)');
      var tm=tmNorm(r);
      if(isAct){
        actByMo[mo-1]+=exv;
        if(actTm[tm]) actTm[tm][mo-1]+=exv;
      } else if(r.st!=='Excluded'&&r.st!=='SC Offer'){
        fcByMo[mo-1]+=exv;
        if(fcTm[tm]) fcTm[tm][mo-1]+=exv;
      }
    });
  }

  // AFC = Actual FAD + Forecast
  var afcByMo=budByMo.map(function(_,i){ return actByMo[i]+fcByMo[i]; });
  var afcTm={};
  TMS.forEach(function(tm){ afcTm[tm]=actTm[tm].map(function(v,i){ return v+(fcTm[tm]?fcTm[tm][i]:0); }); });

  var budTotal=budByMo.reduce(function(s,v){return s+v;},0);
  var afcTotal=afcByMo.reduce(function(s,v){return s+v;},0);

window._deferredLoaded = window._deferredLoaded || {};
function _ensureDeferred(tplId){
  if(window._deferredLoaded[tplId]) return true;
  try {
    var el = document.getElementById(tplId);
    if(!el){ return false; }
    var code = el.textContent || el.innerHTML;
    if(!code || !code.trim()){ window._deferredLoaded[tplId]=true; return true; }
    var s = document.createElement('script');
    s.textContent = code;
    document.body.appendChild(s);
    window._deferredLoaded[tplId] = true;
    return true;
  } catch(e){ console.error('deferred load fail', tplId, e); return false; }
}

var _SESSION_KEY = 'bjh_session';
var _SESSION_TTL = 24 * 60 * 60 * 1000; // 1 วัน
var _currentUser = null; // { empId, name, role, email }

// ── SHA-256 (pure JS) ─────────────────────────────────
async function sha256(msg) {
  var enc = new TextEncoder();
  var buf = await crypto.subtle.digest('SHA-256', enc.encode(msg));
  return Array.from(new Uint8Array(buf)).map(function(b){ return b.toString(16).padStart(2,'0'); }).join('');
}

// ── Session ───────────────────────────────────────────
function _saveSession(user) {
  try {
    localStorage.setItem(_SESSION_KEY, JSON.stringify({
      user: user, ts: Date.now()
    }));
  } catch(e) {}
}

function _loadSession() {
  try {
    var raw = localStorage.getItem(_SESSION_KEY);
    if (!raw) return null;
    var s = JSON.parse(raw);
    if (!s || !s.user || !s.ts) return null;
    if (Date.now() - s.ts > _SESSION_TTL) {
      localStorage.removeItem(_SESSION_KEY);
      return null;
    }
    return s.user;
  } catch(e) { return null; }
}

function _clearSession() {
  try { localStorage.removeItem(_SESSION_KEY); } catch(e) {}
}

  var ubRole = document.getElementById('ub-role');

  var cfgBtn = document.querySelector('.hdr-btn-upload');

  // แสดง Confirm Billing สำหรับ sales และ manager
  var cbBtn = document.getElementById('btn-confirm-billing');
  if (cbBtn) cbBtn.style.display = (isSales() || isManager()) ? '' : 'none';
  // ล็อค Sales filter สำหรับ sales role
  if (isSales() && _currentUser && _currentUser.name) {
    window._SALES_LOCK = _currentUser.name;
    // set dropdown ทันที
    var fSel = document.getElementById('f-sales');
    if (fSel) {
      fSel.innerHTML = '<option value="'+_currentUser.name+'">'+_currentUser.name+'</option>';
      fSel.value = _currentUser.name;
      fSel.disabled = true;
    }
    try { af(); } catch(e) {} } else {
    window._SALES_LOCK = null;
    var fSel2 = document.getElementById('f-sales');
    if (fSel2) fSel2.disabled = false;
  }
  // expose role + tab permissions สำหรับ Dashboard
  window._USER_ROLE = _currentUser.role || 'sales';
  _applyTabPermissionsToDashboard();
}

// helper: เช็คสิทธิ์ 1 key สำหรับ role — ไม่มี admin bypass (admin ตาม config เหมือน role อื่น)
window._tpCan = function(key, role){
  // [v225+v247] sheet ก่อน — ถ้า key ไม่มีใน sheet fallback _TAB_PERM_DEFAULT
  var perms = window._TAB_PERMISSIONS || {};
  var p = perms[key];
  if(!p){ var def = window._TAB_PERM_DEFAULT || {}; p = def[key]; }
  return p ? !!p[role] : false;
};

function _applyNavPermissions(){
  // [v225] guard: ถ้า perms ว่าง (config ยังไม่โหลด) → ข้าม ปล่อยปุ่มโชว์ตาม HTML (กันกระพริบ/ซ่อนหมด)
  if(!window._TAB_PERMISSIONS || Object.keys(window._TAB_PERMISSIONS).length===0) return;
  // [v224] single-DOM, ทุกอย่างตาม config (admin คุมตัวเองได้) — ใช้ _tpCan ตัวเดียว
  var role = window._USER_ROLE || (window._currentUser && window._currentUser.role) || 'sales';
  var navMap = {nav_ds:'nb-ds', nav_home:'nb-home', nav_summary:'nb-db', nav_service:'nb-se', nav_prospect:'nb-sp'};
  var visibleNav = [];
  Object.keys(navMap).forEach(function(navKey){
    var canSee = window._tpCan(navKey, role);
    var btn = document.getElementById(navMap[navKey]);
    if(btn) btn.style.display = canSee ? 'inline-flex' : 'none';
    var mbBtn = document.getElementById('mbn-'+navMap[navKey].replace('nb-',''));
    if(mbBtn) mbBtn.style.display = canSee ? '' : 'none';
    if(canSee) visibleNav.push(navMap[navKey].replace('nb-',''));
  });
  // MD Collection (Tools menu) — gate by nav_mdcol
  try {
    var _mdEl = document.getElementById('tool-mdcol');
    if(_mdEl) _mdEl.style.display = window._tpCan('nav_mdcol', role) ? '' : 'none';
  } catch(e){}
  // [v406] Price Table config (Tools menu) — ตั้งสิทธิ์ผ่าน tab_permissions (แก้ไขได้เองที่ Config → สิทธิ์การเข้าถึง)
  try {
    var _ptEl = document.getElementById('tool-pricetbl');
    if(_ptEl) _ptEl.style.display = window._tpCan('tool_pricetbl', role) ? '' : 'none';
  } catch(e){}
  // [v412] Sale Forecast (Tools menu) — ตั้งสิทธิ์ผ่าน tab_permissions
  try {
    var _sfEl = document.getElementById('tool-saleforecast');
    if(_sfEl) _sfEl.style.display = window._tpCan('tool_saleforecast', role) ? '' : 'none';
  } catch(e){}
  // [v445] MA After Sales (Tools menu) — ตั้งสิทธิ์ผ่าน tab_permissions
  try {
    var _maEl = document.getElementById('tool-ma');
    if(_maEl) _maEl.style.display = window._tpCan('tool_ma', role) ? '' : 'none';
    //  [V545] Sales Retention Report — เดิมไม่ถูกคุมสิทธิ์เลย
    var _rtEl = document.getElementById('tool-retention');
    if(_rtEl) _rtEl.style.display = window._tpCan('tool_retention', role) ? '' : 'none';
  } catch(e){}
  window._visibleNav = visibleNav;
  // [DEBUG] เขียนค่า permission ลง dbg-box (กด 🐛)
  try{
    var _db=document.getElementById('dbg-box');
    if(_db){
      var _btn=function(id){var e=document.getElementById(id);return e?(e.style.display||'(default)'):'(no el)';};
      var _t='=== NAV PERMISSION [v224] ('+new Date().toLocaleTimeString()+') ===\n';
      _t+='role = '+role+(window._USER_ROLE?'':' (จาก _currentUser/default)')+'\n';
      _t+='_TAB_PERMISSIONS = '+JSON.stringify(window._TAB_PERMISSIONS)+'\n';
      _t+='nb-ds:'+_btn('nb-ds')+' nb-home:'+_btn('nb-home')+' nb-db:'+_btn('nb-db')+' nb-se:'+_btn('nb-se')+' nb-sp:'+_btn('nb-sp')+'\n';
      _t+='visibleNav = ['+visibleNav.join(', ')+']\n';
      _db.textContent=_t+(_db.textContent||'');
    }
  }catch(e){}
}
// auto-switch แยกต่างหาก เรียกเฉพาะตอน landing/login (ไม่ใช่ทุก sv) — กันเด้ง/วนลูป
function _autoSwitchIfHidden(){
  var vis = window._visibleNav || [];
  var curOn = document.querySelector('.view.on');
  var curView = curOn ? curOn.id.replace('v-','') : 'db';
  var _navExempt = ['ds','loa','mdcol','ma','bvf']; // หน้านอก navMap — ไม่เตะออก
  if(_navExempt.indexOf(curView)<0 && vis.indexOf(curView)<0 && vis.length){
    // [v327] se ก่อน db (landing = Service Commercial) — ไม่เด้งไป Dashboard ทับ landing
    var pref=['se','db','sp','home']; var dest=null;
    for(var k=0;k<pref.length;k++){ if(vis.indexOf(pref[k])>=0){ dest=pref[k]; break; } }
    if(!dest) dest=vis[0];
    try { sv(dest); } catch(e){}
  }

// [v409] Badge มุมซ้ายบน: build version + Master/TX timestamp + สีตามสถานะ lazy load
window._bjhLazy = { sp:false, install:false, master:false };
window._bjhMasterTs = null;
window._bjhTxTs = null;
function _bjhFmtTs(ts){
  try{
    var d = (ts instanceof Date) ? ts : new Date(ts);
    if(isNaN(d.getTime())) return '—';
    var MON=['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
    var dd=d.getDate();
    var mm=MON[d.getMonth()];
    var yyyy=d.getFullYear();
    var hh=String(d.getHours()).length<2?'0'+d.getHours():String(d.getHours());
    var mi=String(d.getMinutes()).length<2?'0'+d.getMinutes():String(d.getMinutes());
    return dd+mm+yyyy+' '+hh+'.'+mi;
  }catch(e){ return '—'; }
}
var _BJH_BADGE_MIN_MS = 1500; // [v416] เหลืองขั้นต่ำ 1.5 วิ ให้ตาเห็นทัน (กันเร็วเกินสังเกต)
function _bjhUpdateBadge(){
  try{
    var vs=document.getElementById('ver-stamp');
    if(!vs) return;
    var lz=window._bjhLazy||{};
    var allDone = !!(lz.sp && lz.install && lz.master);
    var startTs = window._bjhBadgeStartTs || Date.now();
    var elapsed = Date.now() - startTs;
    var showGreen = allDone && elapsed >= _BJH_BADGE_MIN_MS;
    if(allDone && !showGreen){
      // [v416] ครบทุกจุดแล้วแต่ยังไม่ถึงเวลาขั้นต่ำ -> ค้างเหลืองไว้ก่อน แล้วนัด re-render ตอนครบเวลา
      var remain = _BJH_BADGE_MIN_MS - elapsed;
      if(!window._bjhBadgeGreenTimer){
        window._bjhBadgeGreenTimer = setTimeout(function(){
          window._bjhBadgeGreenTimer = null;
          try{ _bjhUpdateBadge(); }catch(e){}
        }, remain > 0 ? remain : 0);
      }
    }
    var color = showGreen ? '#34d399' : '#facc15';
    var bv=(window._BJH_BUILD&&window._BJH_BUILD.ver)||'';
    // [v428] เหลือแค่วันที่-เวลาล่าสุดค่าเดียว (ไม่แยก Master/TX แล้ว) — ใช้ค่าที่ใหม่กว่าระหว่าง Master/TX
    var _mMs = window._bjhMasterTs ? new Date(window._bjhMasterTs).getTime() : 0;
    var _tMs = window._bjhTxTs ? new Date(window._bjhTxTs).getTime() : 0;
    var _latestTs = (_tMs >= _mMs) ? window._bjhTxTs : window._bjhMasterTs;
    var latestTxt = _latestTs ? _bjhFmtTs(_latestTs) : '—';
    // [v484] แสดงเวลาที่โหลดเสร็จ + ใช้เวลากี่วินาที (user ขอ)
    var _loadTxt = '';
    try{
      if(window._bjhLoadDoneAt && window._bjhLoadSecs){
        var _d = window._bjhLoadDoneAt;
        var _p2 = function(x){ return (x<10?'0':'')+x; };
        _loadTxt = ' | ⏱ ' + _p2(_d.getHours())+':'+_p2(_d.getMinutes())+':'+_p2(_d.getSeconds())
                 + ' (' + window._bjhLoadSecs + ' วิ)';
      }
    }catch(e){}
    vs.textContent=bv+' build: | '+latestTxt+_loadTxt;
    vs.style.color=color;
    vs.style.borderColor=color;
  }catch(e){}
}
function _bjhMarkLazy(key){
  try{
    window._bjhLazy = window._bjhLazy || {sp:false,install:false,master:false};
    window._bjhLazy[key]=true;
    _bjhUpdateBadge();
    // [V479.45] เชื่อม Loading Gate — _bjhMarkLazy ถูกเรียกครบทุก path (รวม cache restore)
    //   sp/install/master → mark 'master' ใน boot gate (ข้อมูลหลักพร้อม)
    try{
      if(window._bootMark){
        var lz = window._bjhLazy;
        if(lz.master || lz.install || lz.sp) window._bootMark('master');
      }
    }catch(_e){}
  }catch(e){}
}
window._bjhMarkLazy=_bjhMarkLazy;
window._bjhUpdateBadge=_bjhUpdateBadge;

function _bootLogin() {
  var sess = _loadSession();
  if (sess) {
    _currentUser = sess;
    _showApp();
    return;
  }
  // แสดง login screen
  try{window._hideBootLoading&&window._hideBootLoading();}catch(e){} // [v232] ยังไม่ login -> ปิด boot overlay ให้กรอกได้

  document.getElementById('app').style.display = 'none';
  setTimeout(function(){ var el = document.getElementById('li-empid'); if(el) el.focus(); }, 100);
}

// [V515] จับ error ที่หลุดออกมาตอนอยู่หน้า Mobile -> โชว์บนจอ
(function(){
  try {
    window.addEventListener('error', function(ev){
      try {
        var mb = document.getElementById('mb-root');
        if (!mb || mb.style.display === 'none') return;   // ไม่ได้อยู่ mobile -> ปล่อย
        if (document.getElementById('mb-fatal')) return;  // โชว์ไปแล้ว
        var m = (ev && ev.message) || 'unknown error';
        var f = (ev && ev.filename) ? (ev.filename + ':' + (ev.lineno||'?')) : '';
        if (typeof window._mbFatal === 'function') window._mbFatal('JS error', m + (f ? ('\n' + f) : ''));
      } catch(e){}
    });
  } catch(e){}
})();

// ── doLogin ───────────────────────────────────────────
function doLogin() {
  var empId = (document.getElementById('li-empid').value || '').trim();
  var pwd   = (document.getElementById('li-pwd').value   || '');
  var errEl = document.getElementById('li-err');
  if (!empId || !pwd) { errEl.textContent = 'กรุณากรอก รหัสพนักงาน และ รหัสผ่าน'; return; }
  errEl.textContent = 'กำลังตรวจสอบ...';
  sha256(pwd).then(function(hash) {
    if (typeof google !== 'undefined' && google.script && google.script.run) {
      google.script.run
        .withSuccessHandler(function(res) {
          try {
            var r = typeof res === 'string' ? JSON.parse(res) : res;
            if (!r.ok) { errEl.textContent = r.error || 'รหัสพนักงานหรือรหัสผ่านไม่ถูกต้อง'; return; }
            _currentUser = r.user;
            _saveSession(_currentUser);
            if (r.mustChange) {
              _showChangePwd();
            } else {
              // ใช้ _showApp() แทน location.reload — Apps Script iframe จะหน้าขาวถ้า reload
              _showApp();
            }
          } catch(e) { errEl.textContent = 'เกิดข้อผิดพลาด กรุณาลองใหม่'; }
        })
        .withFailureHandler(function(e) { errEl.textContent = 'ไม่สามารถเชื่อมต่อได้: ' + (e.message||''); })
        .loginUser(JSON.stringify({ empId: empId, passwordHash: hash }));
    } else {
      // dev fallback
      errEl.textContent = '';
      _currentUser = { empId: empId, name: empId, role: 'admin', email: '' };
      _saveSession(_currentUser);
      _showApp();
    }
  });
}

  if (!confirm('ออกจากระบบ?')) return;
  _clearSession();
  _currentUser = null;
  try { window._USER_ROLE = null; window._TAB_PERMISSIONS = null; } catch(e){}

  try {

        .changePassword(JSON.stringify({ empId: _currentUser.empId, passwordHash: hash }));

function init(records,parts,salesArr){
  try{
    function ymVal(y,m){ return Number(y||0)*100 + Number(m||0); }
    function isPast(y,m){ return ymVal(y,m) < ymVal(ETL_CUR_YR,ETL_CUR_MO); }
    // [v424] คัด QSP23/QSP24 (ของเก่ามาก) ออกจาก window.D ทั้งระบบ — เดิมโผล่ใน Confirm Billing modal
    //   ทั้งที่ Service Commercial Orders ไม่โชว์ (ถูกต้องอยู่แล้ว เพราะกรองคนละจุด) ตอนนี้กรองที่ต้นทาง D เลย
    D=(Array.isArray(records)?records:[]).filter(function(r){
      return r && !/^QSP(23|24)/i.test(String(r.qn||''));
    }).map(function(src){
      var r=Object.assign({}, src||{});
      if(!r.qs) r.qs='';

      // Normalize source month/year
      var srcMo=Number(r.carry_from_mo||r.rbmo||r.mo||0);
      var srcYr=Number(r.carry_from_yr||r.rbyr||r.yr||0);
      if(srcMo && srcYr){
        r.carry_from_mo=srcMo;
        r.carry_from_yr=srcYr;
      }

      // Normalize FAD-based statuses
      var fad=resolveFadStatus(r.bn,r.px||0);
      if(r.st==='Actual' || r.st==='Actual FAD' || r.st==='Backlog' || (/^SC:Await FAD Match$|^SP:Await FAD Match$/i).test(r.ip||'')){
        if(/^36\d{8,}$/.test(normBill(r.bn))){
          if(fad.actual){
            r.st='Actual FAD';
            r.fad_state='FAD Matched';
            r.ip=(r.t==='SC')?'SC:Bill Confirmed':'SP:Bill Confirmed';
          }else{
            r.st='Backlog';
            r.fad_state=fad.state||'FAD Unmatched';
            if(fad.zero){
              r.px=Number(r.px||0); // keep original amount, gray only in UI
              r.ip=(r.t==='SC')?'SC:FAD Net Zero':'SP:FAD Net Zero';
            }else{
              r.ip=(r.t==='SC')?'SC:Await FAD Match':'SP:Await FAD Match';
            }
          }
        }
      }else if(/^36\d{8,}$/.test(normBill(r.bn))){
        if(fad.actual) r.fad_state='FAD Matched';
        else if(fad.zero){ r.fad_state='FAD Net Zero'; r.px=Number(r.px||0); }
        else if(fad.state) r.fad_state=fad.state;
      }

      if(isOfferSC(r.sc)){
        if(r.bn){
          var _dOff2=r.bd?new Date(r.bd):null;
          if(_dOff2&&!isNaN(_dOff2)){ r.mo=_dOff2.getMonth()+1; r.yr=_dOff2.getFullYear(); r.fmo=r.mo; r.fyr=r.yr; }
          r.st='Billed'; r.ip='SC Pending';
        } else { r.st='Offer'; r.ip=(String(r.sn||'').trim()==='Completed')?'PM Completed':(String(r.sn||'').trim()==='Canceled')?'Cancel PM':'Waiting PM'; }
      }
      if(r.st==='Carry On') r.st='Ordered';
      if(!r.st){
        r.st='Data Issue';
        if(!r.ip) r.ip='Data Issue';
      }

      // Ordered remains a status, carry is represented by pill on IP + source month label
      if(r.st==='Ordered'){
        r.co_ready=(String(r.sn||'').trim()==='Completed')?1:0;
        var _sn3818=String(r.sn||'').trim();
        r.ip=r.co_ready===1?'Waiting Bill':(_sn3818==='Canceled'?'Cancel PM':'Waiting PM');
      }else{
        r.co_ready=Number(r.co_ready||0);
      }

      // FINAL MONTH LOGIC
      // Past months may show only Actual FAD or Backlog.
      // Everything else from past shifts into current month, while keeping source month for label/debug.
      r.is_carry=0;
      if(srcMo && srcYr && isPast(srcYr,srcMo) && r.st!=='Actual FAD' && r.st!=='Backlog'){
        r.is_carry=1;
        r.mo=ETL_CUR_MO; r.yr=ETL_CUR_YR;
        r.fmo=ETL_CUR_MO; r.fyr=ETL_CUR_YR; r.fm=r.fmo; r.fy=r.fyr;
      }else{
        if(srcMo && srcYr){ r.mo=srcMo; r.yr=srcYr; }
        r.fmo=Number(r.fmo||r.fm||r.mo||0);
        r.fyr=Number(r.fyr||r.fy||r.yr||0);
        r.fm=r.fmo; r.fy=r.fyr;
      }

      return r;
    });
    // Add fixed SP forecast rows: one synthetic line per future month at 5.2M Ex.VAT
    // SP Fix rows managed via Forecast SP tab
    PARTS=parts||{};
    FD=D.slice();
    try{ populateIP(); }catch(e){}
    try{ populateSales(Array.isArray(salesArr)?salesArr:[]); }catch(e){ console.error('populateSales failed',e); }
    try{ buildSummary(); }catch(e){ console.error('buildSummary failed',e); }
    try{ af(); }catch(e){ console.error('af failed',e); }
    var ld=document.getElementById('ld'); if(ld) ld.style.display='none';
    var appEl=document.getElementById('app'); if(appEl) appEl.style.display='flex';
    try{ _bjhLanding(); }catch(e){ try{sv('se');}catch(e2){} }
    try{ renderBVF(); }catch(e){ console.error('renderBVF failed',e); }
    APP={ready:true,records:D.length,parts:Object.keys(PARTS||{}).length,version:(document.getElementById('ver-stamp')||{}).textContent||'embedded',lastError:''};
    window.APP=APP;
    return true;
  }catch(err){
    console.error('init failed', err);
    APP={ready:false,records:Array.isArray(records)?records.length:0,parts:parts?Object.keys(parts).length:0,version:'init-failed',lastError:String(err&&err.message||err)};
    window.APP=APP;
    return false;
  }
}

function renderSCContractTable(badge){
  var _psFilter=window._psFilter||{sa:'all',q:''};
  // lock สำหรับ sales role
  if(window._spIsSales && window._spMyName){ _psFilter = Object.assign({}, _psFilter, {sa: window._spMyName}); }
  var contracts=typeof _jsupContract!=='undefined'&&_jsupContract?_jsupContract:[];
  var MAINT_CT=["สัญญาบริการ (ไม่รวมอะไหล่)","สัญญาบริการ (รวมอะไหล่แบบยกเว้น)","สัญญาบริการ (รวมอะไหล่)","สัญญาบริการ (ไม่รวมอะไหล่แบบยกเว้น)"];
  var SALE_CT=["สัญญาซื้อขาย","สัญญาเช่า","สัญญาเช่าซื้อ"];
  var SKIP_CR=["ยกเลิกสัญญา","Canceled"];
  if(typeof _crFilter==='undefined') window._crFilter={sa:'all',ctSel:[],brSel:[],trigger:'0',days:'365',dateFrom:'',dateTo:'',showExpired:false,q:''};
  var _pf=_crFilter;
  var _dfStr=(_pf.dateFrom&&_pf.dateFrom!=='')?_pf.dateFrom:'2025-10-01';
    var _dtStr=(_pf.dateTo&&_pf.dateTo!=='')?_pf.dateTo:'2026-12-31';
    var dateFrom=new Date(_dfStr), dateTo=new Date(_dtStr);
  var today=new Date(); today.setHours(0,0,0,0);
  function getSa(cu){ return (typeof _fuzzyFindSales==='function')?(_fuzzyFindSales(cu)||'Unknown'):'Unknown'; }
  function fmV(v){if(!v)return '0';return v>=1e6?(v/1e6).toFixed(2)+'M':v>=1e3?(v/1e3).toFixed(0)+'K':Math.round(v).toLocaleString();}
  function esc2(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;');}

  var ctTypes=badge==='sc-maint'?MAINT_CT:SALE_CT;
  var rows=[];
  contracts.forEach(function(c){
    if(SKIP_CR.indexOf(c.CONTRACT_PROCESS_STATUS_NAME||'')>=0) return;
    if(ctTypes.indexOf(c.CONTRACT_TYPE||'')<0) return;
    var endStr=String(c.CONTRACT_END_DATE||'').slice(0,10);
    if(!endStr||endStr==='None') return;
    var end=new Date(endStr+'T00:00:00');
    if(isNaN(end)||end<dateFrom||end>dateTo) return;
    var sa=getSa(c.CUSTOMER_NAME||'');
    if(_psFilter.sa!=='all'&&sa!==_psFilter.sa) return;
    if(_psFilter.q){
      var q=_psFilter.q.toLowerCase();
      var txt=((c.CUSTOMER_NAME||'')+' '+(c.BRAND||'')+' '+(c.Model||'')+' '+sa+' '+(c.CONTRACT_NO||'')+' '+(c.QUOTATION_NO||'')).toLowerCase();
      if(txt.indexOf(q)<0) return;
    }
    var days=Math.round((end-today)/86400000);
    rows.push({
      sa:sa, cu:c.CUSTOMER_NAME||'', br:c.BRAND||'-', ml:c.Model||'',
      sn:c.SERAIL_NUMBER||'', ct:c.CONTRACT_TYPE||'',
        price:parseFloat(c.CONTRACT_PRICE||0)||parseFloat(c.CONTRACT_PRICE_NET||0),
      endDate:endStr, days:days,
      len:c.CONTRACT_LENGHT||'1',
      qn:c.QUOTATION_NO||c.QH_DOC_NUMBER_CREATE||'-',
      conNo:c.CONTRACT_NO||''
    });
  });

  rows.sort(function(a,b){ return a.endDate.localeCompare(b.endDate); });

function soExportExcel(type){
  var contracts=typeof _jsupContract!=='undefined'&&_jsupContract?_jsupContract:[];
  var proData=typeof PRO_DATA!=='undefined'&&PRO_DATA?PRO_DATA:[];
  var today=new Date(); today.setHours(0,0,0,0);

  var rows=[], headers=[];
  if(type==='renewal'){
    headers=['Sales','ลูกค้า','Brand','Model','SN','เลขสัญญา','QN','ประเภทสัญญา','ราคา','วันสิ้นสุด','วันเหลือ','Trigger'];
    var tLabel={'0':'ยังไม่เสนอ','1':'เสนอแล้ว','2':'ไม่เสนอ'};
    contracts.forEach(function(c){
      if((c.CONTRACT_PROCESS_STATUS_NAME||'').indexOf('ยกเลิก')>=0) return;
      var end=c.CONTRACT_END_DATE?new Date(String(c.CONTRACT_END_DATE).slice(0,10)):null;

      var days=Math.round((end-today)/(86400000));
      if(days<0) return;
      rows.push([
        getSa(c.CUSTOMER_NAME||''),
        c.CUSTOMER_NAME||'', c.BRAND||'', c.Model||'', c.SERAIL_NUMBER||'',
        c.CONTRACT_NO||'', c.QUOTATION_NO||c.QH_DOC_NUMBER_CREATE||'',
        c.CONTRACT_TYPE||'', parseFloat(c.CONTRACT_PRICE||0),
        String(c.CONTRACT_END_DATE||'').slice(0,10), days,
        tLabel[String(c.con_trigger_do_create_quotation||'0')]||''
      ]);
    });
  } else {
    headers=['Sales','TYPE','QN','ลูกค้า','Brand','Model','H/M/L','Status QN','มูลค่า','ต่อปี','ระยะ','Start Contract','Update On'];
    proData.forEach(function(r){

    });

  var csv=[headers.join(',')];
  rows.forEach(function(r){
    csv.push(r.map(function(v){ var s=String(v===null||v===undefined?'':v); if(s.indexOf(',')>=0||s.indexOf('"')>=0) s='"'+s.replace(/"/g,'""')+'"'; return s; }).join(','));
  });
  var blob=new Blob(['\uFEFF'+csv.join('\n')],{type:'text/csv;charset=utf-8'});
  var a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=(type==='renewal'?'Contract_Renewal':'Prospect_Pipeline')+'_'+new Date().toISOString().slice(0,10)+'.csv';
  a.click();

  var pivMonthSet={};  // ymKey → true (เก็บเดือนที่มีข้อมูล)
  FD.forEach(function(r){
    var inv=r.px||0; var exv=inv/1.07;
    var team=getTeam(r)||r.tm||'';
    var brand=r.br||r.pg||'';
    var model=r.ml||r.pn||'';
    var billMo=Number(r.rbmo||r.mo||0);
    var billYr=Number(r.rbyr||r.yr||0);
    var billRound=billMo>0&&billMo<=12?MO_TH[billMo-1]+(billYr?' '+billYr:''):(r.rb||'');
    rows.push([
      r.sa||'',
      r.t||'',
      team,
      r.cu||'',
      brand,
      model,
      r.sr||'',
      r.cn||'',
      r.qn||'',
      r.bn||'',                 // [V519] เลขบิล (BILL_NUMBER) — ว่างถ้ายังไม่เปิดบิล
      _xlBillDate(r.bd),        // [V519] วันที่บิล (BILL_PRINT_DATE)
      r.ctn||'',                // [V519] ประเภทสัญญา (CONTRACT_TYPE_NAME/CONTRACT_NAME)
      r.st||'',
      r.ip||'',
      billRound,
      billYr||'',
      Math.round(inv*100)/100,
      Math.round(exv*100)/100
    ]);
    // ── สะสม pivot ──
    var tp=String(r.t||'').toUpperCase();
    if(tp!=='SC'&&tp!=='SP') return;            // เฉพาะ SC/SP
    if(!(billMo>=1&&billMo<=12&&billYr>0)) return; // ต้องมีเดือน/ปีบิลที่ถูกต้อง
    var cust=r.cu||'(ไม่ระบุ)';
    var ymKey=billYr*12+(billMo-1);
    pivMonthSet[ymKey]=true;
    if(!pivData[tp]) pivData[tp]={};
    if(!pivData[tp][cust]) pivData[tp][cust]={months:{},total:0};
    pivData[tp][cust].months[ymKey]=(pivData[tp][cust].months[ymKey]||0)+exv;
    pivData[tp][cust].total+=exv;
  });

  // ── สร้าง workbook ──
  var wb=XLSX.utils.book_new();
  // Sheet 1: รายการ
  var ws1=XLSX.utils.aoa_to_sheet(rows);
  XLSX.utils.book_append_sheet(wb, ws1, 'BJH_Revenue_2026');

  // ── Sheet 2: Pivot (Row = SC/SP → Customer, Col = เดือน + Grand Total) ──
  var ymKeys=Object.keys(pivMonthSet).map(Number).sort(function(a,b){return a-b;});
  function ymLabel(k){ var yr=Math.floor(k/12); var mo=k%12; return MO_TH[mo]+' '+yr; }
  var headerRow=['Row Labels'].concat(ymKeys.map(ymLabel)).concat(['Grand Total']);
  var pivRows=[['Sum of ราคา Ex.VAT'], headerRow];
  // คอลัมน์รวมทั้งหมด (Grand Total ล่างสุด)
  var grandByYm={}; ymKeys.forEach(function(k){ grandByYm[k]=0; });
  var grandTotal=0;
  ['SC','SP'].forEach(function(tp){
    if(!pivData[tp]) return;
    // group header (SC / SP) + subtotal
    var custs=Object.keys(pivData[tp]);
    if(!custs.length) return;
    // subtotal ของกลุ่ม
    var subByYm={}; ymKeys.forEach(function(k){ subByYm[k]=0; });
    var subTotal=0;
    // เรียง customer ตามมูลค่ารวมมาก→น้อย
    custs.sort(function(a,b){ return pivData[tp][b].total - pivData[tp][a].total; });
    // group header row (มี subtotal ต่อเดือนของกลุ่ม)
    var groupRow=[tp];
    var custRows=[];
    custs.forEach(function(cust){
      var c=pivData[tp][cust];
      var row=['    '+cust];
      ymKeys.forEach(function(k){
        var v=c.months[k]||0;
        row.push(v?Math.round(v):'');
        subByYm[k]+=v; grandByYm[k]+=v;
      });
      row.push(Math.round(c.total));
      subTotal+=c.total; grandTotal+=c.total;
      custRows.push(row);
    });
    // เติมค่า subtotal ลง group header row
    ymKeys.forEach(function(k){ groupRow.push(subByYm[k]?Math.round(subByYm[k]):''); });
    groupRow.push(Math.round(subTotal));
    pivRows.push(groupRow);
    custRows.forEach(function(cr){ pivRows.push(cr); });
  });
  // Grand Total row
  var gtRow=['Grand Total'];
  ymKeys.forEach(function(k){ gtRow.push(grandByYm[k]?Math.round(grandByYm[k]):''); });
  gtRow.push(Math.round(grandTotal));
  pivRows.push(gtRow);

  var ws2=XLSX.utils.aoa_to_sheet(pivRows);
  // number format คอลัมน์ตัวเลข (B เป็นต้นไป)
  var nCols=headerRow.length;
  for(var ri=2; ri<pivRows.length; ri++){ // ข้าม title(0)+header(1)
    for(var ci=1; ci<nCols; ci++){
      var addr=XLSX.utils.encode_cell({r:ri, c:ci});
      if(ws2[addr] && typeof ws2[addr].v==='number'){ ws2[addr].t='n'; ws2[addr].z='#,##0'; }
    }
  }
  XLSX.utils.book_append_sheet(wb, ws2, 'Pivot');

  var fname='BJH_Revenue_'+new Date().toISOString().slice(0,10)+'.xlsx';
  XLSX.writeFile(wb, fname);
}

// ── Theme toggle (Level 1: bg/surface/border/text) ──
function _applyTheme(theme){
  var t = (theme === 'light') ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', t);
  // SVG icons swap ด้วย CSS — ไม่ต้อง update textContent
  try { _recolorInlineBg(t); } catch(e){}
  try { _setupThemeObserver(t); } catch(e){}
}

// ── observer: เมื่อ light + DOM เปลี่ยน (content render ใหม่) → recolor อัตโนมัติ ──
var _themeObserver = null, _recolorPending = false;
function _setupThemeObserver(theme){
  if(theme !== 'light'){
    if(_themeObserver){ _themeObserver.disconnect(); _themeObserver = null; }
    return;
  }
  if(_themeObserver) return; // มีอยู่แล้ว
  if(typeof MutationObserver === 'undefined') return;
  _themeObserver = new MutationObserver(function(){
    if(_recolorPending) return;
    _recolorPending = true;
    // debounce — รวบหลาย mutation เป็นรอบเดียว
    (window.requestAnimationFrame || setTimeout)(function(){
      _recolorPending = false;
      if(document.documentElement.getAttribute('data-theme')==='light'){
        try { _recolorInlineBg('light'); } catch(e){}
      }
    });
  });
  _themeObserver.observe(document.body, { childList:true, subtree:true });
}

// ── คำนวณความสว่างจาก hex หรือ rgb() → 0(ดำ)-255(ขาว) ──
function _colorLuma(c){
  if(!c) return 128;
  c = c.trim();
  var r,g,b;
  if(c.charAt(0)==='#'){
    var hex=c.replace('#','');
    if(hex.length===3) hex=hex[0]+hex[0]+hex[1]+hex[1]+hex[2]+hex[2];
    if(hex.length<6) return 128;
    r=parseInt(hex.substr(0,2),16); g=parseInt(hex.substr(2,2),16); b=parseInt(hex.substr(4,2),16);
  } else {
    var m=c.match(/rgba?\(\s*(\d+)\s*,\s*(\d+)\s*,\s*(\d+)/);
    if(!m) return 128;
    r=+m[1]; g=+m[2]; b=+m[3];
  }
  return 0.299*r + 0.587*g + 0.114*b;
}
function _hexLuma(hex){ return _colorLuma(hex); }
// ── สแกน element ที่มี background สีเข้ม → recolor (light) / restore (dark) ──
function _recolorInlineBg(theme){
  var all = document.querySelectorAll('[style*="background"]');
  for(var i=0;i<all.length;i++){
    var el = all[i];
    if(el.closest && el.closest('#v-sp')) continue; // SalesProspect คุมด้วย CSS เอง
    if(theme === 'light'){
      if(el.getAttribute('data-obg')===null){
        // อ่านสีพื้นจาก inline style (รองรับทั้ง #hex และ rgb())
        var st = el.getAttribute('style') || '';
        var m = st.match(/background(-color)?\s*:\s*(#[0-9a-fA-F]{3,6}|rgba?\([^)]+\))/);
        if(m){
          var col = m[2];
          if(_colorLuma(col) < 70){ // พื้นเข้มมาก
            el.setAttribute('data-obg', col);
            el.style.background = 'var(--sur2)';
          }
        }
      }
    } else {
      var ob = el.getAttribute('data-obg');
      if(ob){ el.style.background = ob; el.removeAttribute('data-obg'); }
    }
  }
}
function toggleTheme(){
  var cur = document.documentElement.getAttribute('data-theme') || 'dark';
  var next = (cur === 'light') ? 'dark' : 'light';
  try { localStorage.setItem('bjh_theme', next); } catch(e) {}
  _applyTheme(next);
}
(function _initTheme(){
  var saved = 'dark';
  try { saved = localStorage.getItem('bjh_theme') || 'dark'; } catch(e) {}
  function go(){ _applyTheme(saved); }
  if(document.body){ go(); }
  else if(document.addEventListener){ document.addEventListener('DOMContentLoaded', go); }
  else { go(); }
})();

// [V479.51] PRELOAD Actual FAD รายเซลล์ ตั้งแต่ boot
//   เดิม loadSalesActual() ถูกเรียกเฉพาะเมื่อเลือก sales รายคน (_saFilt) → เปิดหน้าแรก (All Sales) ไม่เคยโหลด

window._preloadSalesActual = function(){
  try{
    if(window._saActPreloading) return;
    window._saActPreloading = true;
    if(typeof google==='undefined' || !google.script || !google.script.run){
      window._saActData = window._saActData || {};
      window._saActLoadedOK = true;
      try{ if(window._bootMark) window._bootMark('actual'); }catch(e){}
      return;
    }
    var _yr = window.CUR_YR || (new Date().getFullYear());
    google.script.run
      .withSuccessHandler(function(res){
        try{
          var r = (typeof res==='string') ? JSON.parse(res) : res;
          window._saActData = (r && r.ok && r.data) ? r.data : {};
        }catch(e){ window._saActData = {}; }
        window._saActLoadedOK = true;
        try{ if(window._bootMark) window._bootMark('actual'); }catch(e){}
        try{ if(typeof window.dbRender==='function') window.dbRender(); }catch(e){}
        try{ if(typeof buildSummary==='function') buildSummary(); }catch(e){}
        try{ console.log('[v479.51] Actual FAD preloaded:', Object.keys(window._saActData||{}).length, 'sales'); }catch(e){}
      })
      .withFailureHandler(function(){
        window._saActData = window._saActData || {};
        window._saActLoadedOK = true;
        try{ if(window._bootMark) window._bootMark('actual'); }catch(e){}
      })
      .loadSalesActual(_yr);
  }catch(e){
    window._saActData = window._saActData || {};

};

// ════════════════════════════════════════════════════════
// IndexedDB Cache — รองรับ data 100MB+ (localStorage มี limit 5-10MB)
// ════════════════════════════════════════════════════════
var _IDB_DB_NAME = 'bjh_cache_db';
var _IDB_STORE = 'cache';
var _IDB_KEY = 'data_v1';
var _idbConn = null;

function _idbOpen(){
  return new Promise(function(resolve, reject){
    if(_idbConn){ resolve(_idbConn); return; }
    if(!('indexedDB' in window)){ reject(new Error('IndexedDB not supported')); return; }
    try {
      var req = indexedDB.open(_IDB_DB_NAME, 1);
      req.onupgradeneeded = function(e){
        var db = e.target.result;
        if(!db.objectStoreNames.contains(_IDB_STORE)) db.createObjectStore(_IDB_STORE);
      };
      req.onsuccess = function(e){ _idbConn = e.target.result; resolve(_idbConn); };
      req.onerror = function(e){ reject(e.target.error || new Error('IDB open failed')); };
      req.onblocked = function(){ reject(new Error('IDB blocked')); };
    } catch(e) { reject(e); }
  });
}

function _idbSave(obj){
  return _idbOpen().then(function(db){
    return new Promise(function(resolve, reject){
      try {
        var tx = db.transaction([_IDB_STORE], 'readwrite');
        var st = tx.objectStore(_IDB_STORE);
        var rq = st.put(obj, _IDB_KEY);
        rq.onsuccess = function(){ resolve(true); };
        rq.onerror = function(e){ reject(e.target.error || new Error('IDB put failed')); };
      } catch(e){ reject(e); }
    });
  });
}

function _idbLoad(){
  return _idbOpen().then(function(db){
    return new Promise(function(resolve, reject){
      try {
        var tx = db.transaction([_IDB_STORE], 'readonly');
        var st = tx.objectStore(_IDB_STORE);
        var rq = st.get(_IDB_KEY);
        rq.onsuccess = function(e){ resolve(e.target.result || null); };
        rq.onerror = function(e){ reject(e.target.error || new Error('IDB get failed')); };
      } catch(e){ reject(e); }
    });
  });
}

function _idbDelete(){
  return _idbOpen().then(function(db){
    return new Promise(function(resolve){
      try {
        var tx = db.transaction([_IDB_STORE], 'readwrite');
        tx.objectStore(_IDB_STORE).delete(_IDB_KEY);
        tx.oncomplete = function(){ resolve(true); };
        tx.onerror = function(){ resolve(false); };
      } catch(e){ resolve(false); }
    });
  });
}

// [v323] แปลง 1 install row → object (แยกออกมาใช้ทั้ง sync + chunked)
function _mapInstallRow(_ir){
  var o = {
    'วันที่ติดตั้ง': _ir.INSTALL_DATE||'', // [v449] CRM ส่ง field วันติดตั้งจริงมาแล้วใน RAW_INSTALLATION — เดิมใช้ CON_START_DATE (วันเริ่มสัญญา) เป็นตัวแทนซึ่งไม่ใช่วันติดตั้งจริง
    'Customer': _ir.CUS_NAME||'',
    'ยี่ห้อ': _ir.BRAND||'',
    'รุ่น': _ir.MODEL||_ir.MODEL_TEMP||'',
    'จังหวัด': (window._provLookup && window._provLookup[String(_ir.CUS_ID||'').trim()]) || '',
    'SN': _ir.SN||'',
    'วันสิ้นสุดสัญญา': _ir.CON_END_DATE||'',
    'สัญญา': _ir.CON_END_DATE ? '☑' : '',
    'ประเภทสัญญา': _ir.CON_TYPE||'',
    'ผู้แทน Service': _ir.SALE_SERVICE_NAME||'',
    '_sales': _ir.SALE_SERVICE_NAME||'',
    'CON_NO': _ir.CON_NO||'', 'QH_DOC_NUMBER': _ir.QH_DOC_NUMBER||'',
    '_CUS_ID': String(_ir.CUS_ID||'').trim()
  };
  var _SKEEP=['MODEL','BRAND','CUS_NAME','SN','CON_END_DATE','CON_START_DATE','CON_TYPE','CON_NO','SALE_SERVICE_NAME','QH_DOC_NUMBER','CONTRACT_PRICE','INSTALL_DT_ID','MC_ISSUE_TAGS','MC_STATUS','MC_STATUS_NAME','CONTRACT_TYPE_TYPE','MC_STATUS_HISTORY']; // [v366] เพิ่มประวัติสถานะ — ใช้กับปุ่ม "ประวัติ" + รายงานสรุปรายเดือน
  for(var _ski=0;_ski<_SKEEP.length;_ski++){ var _k=_SKEEP[_ski]; if(!(_k in o)) o[_k]=_ir[_k]; }
  return o;
}

function _applyMasterData(content, onReady) {
  try {
    console.error('[v356] apply start: content len=' + (content ? String(content).length : 'null') + ' type=' + typeof content);
    var text = _decompress(content);
    if (typeof text !== 'string') { console.error('[v356] master decompress ผิด type:', typeof text, text && text.constructor && text.constructor.name); if(typeof onReady==='function') onReady(); return; }
    console.error('[v356] decompress OK: text len=' + text.length);
    var parsed = jsupExtractJSON(text);
    if (!parsed) { console.error('[v356] parse คืน null/empty'); if(typeof onReady==='function') onReady(); return; }
    console.error('[v356] parse OK: keys=' + Object.keys(parsed).join(','));
    if (parsed && parsed.data && typeof parsed.data === 'object') parsed = parsed.data;
    console.error('[v356] RAW_CONTRACT: isArray=' + Array.isArray(parsed.RAW_CONTRACT) + ' len=' + ((parsed.RAW_CONTRACT||[]).length));
    if (Array.isArray(parsed.RAW_CONTRACT)){              _jsupContract = parsed.RAW_CONTRACT; window._jsupContract = _jsupContract; } // [v456] เพิ่ม window. — เดิม set แค่ local ทำให้หน้า Contract & PO อ่าน window._jsupContract ได้ 0 rows → * ส้มทุกแถว
    if (Array.isArray(parsed.RAW_CUSTOMER))              window._spCustomerRows = parsed.RAW_CUSTOMER;
    if (Array.isArray(parsed.RAW_INSTALLATION)) {
      // [V479.12] เก็บ raw install ทั้งหมด (รวม Disabled) สำหรับ Sales Retention — เพราะ retention ต้องนับเครื่องเก่าที่ปิดแล้วด้วย
      try{ window._spInstallAll = parsed.RAW_INSTALLATION.slice(); }catch(e){}
      // [v450] กรองเฉพาะเครื่องที่ยังใช้งาน (INSTALL_STATUS='0' Enabled) เท่านั้น — ตัดเครื่องปิด/ยกเลิกออกตั้งแต่ต้นทาง ครอบทั้ง chunked + sync
      // [v480] SLIM GUARD — เตือนถ้า ex_col ตัด field วิกฤตทิ้ง (field หาย = ฟีเจอร์พังเงียบ)
      try { window._bjhSlimGuard(parsed); } catch(_e){}
      var _rawInst = parsed.RAW_INSTALLATION.filter(function(_r){
        return String(_r.INSTALL_STATUS==null?'':_r.INSTALL_STATUS).trim()==='0';
      });
      // [v323] transform install แบบ chunked (2000 rows/ก้อน + yield) — กันบล็อก main thread 3.9 วิ
      if(typeof onReady==='function'){
        var _CHUNK=2000, _n=_rawInst.length, _res=new Array(_n), _idx=0;
        (function _doChunk(){
          var _stop=Math.min(_idx+_CHUNK, _n);
          for(var _ci=_idx; _ci<_stop; _ci++){ _res[_ci]=_mapInstallRow(_rawInst[_ci]); }
          _idx=_stop;
          if(_idx<_n){ setTimeout(_doChunk, 0); } // yield ให้ UI หายใจ
          else {
            window._spInstallRows=_res;
            _bmLookupCache=null; _installBMIndex=null;
            onReady();
          }
        })();
        return; // async — จบใน callback
      }
      // sync fallback (ไม่มี callback) — เหมือนเดิม
      window._spInstallRows = _rawInst.map(_mapInstallRow);
    }
    _bmLookupCache = null; _installBMIndex = null;
    if(typeof onReady==='function') onReady();
  } catch(e) { console.error('[v356] _applyMasterData ERROR:', e.message, e.stack); if(typeof onReady==='function') onReady(); }
}

function _setProvLookup(map){
  if(!map || typeof map!=='object') return;
  window._provLookup = map;
  // re-apply install transform ถ้า master มาแล้ว (เติมจังหวัดเข้า _spInstallRows เดิม)
  try {
    if(window._spInstallRows && window._spInstallRows.length){
      window._spInstallRows.forEach(function(o){
        if(o && (!o['จังหวัด'])){
          var cid = String(o._CUS_ID||'').trim();
          if(cid && map[cid]) o['จังหวัด'] = map[cid];
        }

function _loadProvince(){

// ─── SmartFlow API Load — Per-User Auth ──────────────────
// Flow:
//   1. คลิก 🔌 Load API → check sessionStorage token
//   2. ถ้าไม่มี token → show Login modal → ขอ username + password → GET token
//   3. ถ้ามี token → call data endpoint with Bearer token
//   4. ถ้า 401 → ลบ token → ขอ login ใหม่ (username pre-fill จาก sessionStorage)
// Per-user: แต่ละ user มี account ของตัวเอง → log username เพื่อตรวจสอบ

function _apiGetToken(){
  try { return sessionStorage.getItem('bjh_smartflow_token') || ''; } catch(e){ return ''; }
}
function _apiSetToken(t){
  try {
    if(t) sessionStorage.setItem('bjh_smartflow_token', t);
    else sessionStorage.removeItem('bjh_smartflow_token');
  } catch(e){}
}
function _apiGetUser(){
  try { return sessionStorage.getItem('bjh_smartflow_user') || ''; } catch(e){ return ''; }
}
function _apiSetUser(u){
  try {
    if(u) sessionStorage.setItem('bjh_smartflow_user', u);
    else sessionStorage.removeItem('bjh_smartflow_user');
  } catch(e){}
}

function apiLoadDataOpen(){
  var modal = document.getElementById('api-load-modal');
  if(!modal) return;
  modal.style.display = 'flex';
  var token = _apiGetToken();
  var user = _apiGetUser();
  var authEl = document.getElementById('api-load-auth-status');
  var logoutBtn = document.getElementById('api-logout-btn');
  if(authEl){
    if(token && user){
      authEl.innerHTML = '✅ Logged in: <b>' + _apiEscape(user) + '</b> (token cached)';
      authEl.style.color = '#4ade80';
    } else {
      authEl.innerHTML = '⚠ ยังไม่ได้ Login — จะขอ Username + Password ตอนกด Load Data';
      authEl.style.color = '#fbbf24';

function _apiEscape(s){
  return String(s||'').replace(/[&<>"']/g, function(c){
    return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
  });
}

function _apiLoadSetStatus(html, color){

function apiLoginSubmit(){
  var cfg = window.API_CONFIG || {};
  var elUser = document.getElementById('api-login-username');
  var elPw = document.getElementById('api-login-password');
  var btn = document.getElementById('api-login-submit-btn');
  var user = elUser ? elUser.value.trim() : '';
  var pw = elPw ? elPw.value : '';
  if(!user){
    _apiLoginSetStatus('❌ กรุณากรอก Username', '#ef4444');
    if(elUser) elUser.focus();
    return;
  }
  if(!pw){
    _apiLoginSetStatus('❌ กรุณากรอก Password', '#ef4444');
    if(elPw) elPw.focus();
    return;
  }
  if(btn){ btn.disabled = true; btn.textContent = '⏳ Authenticating...'; }
  _apiLoginSetStatus('⏳ ขอ Token...', '#60a5fa');
  var tokenUrl = (window.SMARTFLOW_TOKEN_URL || '') +
    '?username=' + encodeURIComponent(user) +
    '&password=' + encodeURIComponent(pw) +
    '&client_name=' + encodeURIComponent(cfg.client_name || 'External');
  var t0 = Date.now();
  fetch(tokenUrl, { method:'GET' })
    .then(function(r){
      if(!r.ok) throw new Error('HTTP ' + r.status + ' ' + r.statusText);
      return r.text();
    })
    .then(function(text){
      var elapsed = Date.now() - t0;
      var token = text.trim();
      try {
        var data = JSON.parse(text);
        token = data.token || data.access_token || data.Token || (data.data && data.data.token) || text.trim();
      } catch(e){}
      if(token.startsWith('"') && token.endsWith('"')) token = token.slice(1,-1);
      if(!token || token.length < 10){
        throw new Error('Token ที่ได้ดูไม่ถูกต้อง: ' + text.substring(0,100));
      }
      _apiSetToken(token);
      _apiSetUser(user); // ★ Save username ใน session
      // ★ Log audit — บันทึก SmartFlow user ที่ login สำเร็จ
      try {
        if(typeof google !== 'undefined' && google.script && google.script.run){
          google.script.run.logAccess('SmartFlow Login', user);
        }
      } catch(e){}
      _apiLoginSetStatus('✅ Login สำเร็จ (' + elapsed + 'ms) — กำลังโหลดข้อมูล...', '#4ade80');
      if(elPw) elPw.value = '';
      if(btn){ btn.disabled = false; btn.textContent = '🔐 Login & Load'; }
      setTimeout(function(){
        apiLoginClose();
        apiLoadDataOpen();
        _apiLoadExecuteWithToken();
      }, 500);
    })
    .catch(function(e){
      var emsg = e && e.message || e;
      var hint = '';
      if(String(emsg).indexOf('CORS')>=0 || String(emsg).indexOf('Failed to fetch')>=0){
        hint = '<br>⚠ CORS issue — ฝั่ง SmartFlow ต้อง enable CORS';
      }
      _apiLoginSetStatus('❌ Login failed: ' + emsg + hint, '#ef4444');
      if(btn){ btn.disabled = false; btn.textContent = '🔐 Login & Load'; }
    });
}

// Apps Script: reload iframe (location.reload) = หน้าขาว → ต้อง navigate top ไป URL /exec ใหม่แทน
function bjhHardRefresh(){
  // [v244] กดทีเดียว = โหลดโค้ดล่าสุด (top-nav ไป exec ใหม่ + cache-bust) + ดึงข้อมูลสด (flag bjh_force_drive)
  // [V479.53] top-nav ต้องมี user gesture — ถ้าเรียกจาก async callback จะโดน sandbox บล็อก
  //   (Console: "Unsafe attempt to initiate navigation... no user activation")
  //   → ถ้า nav ไม่สำเร็จภายใน 600ms → fallback โหลดข้อมูลในหน้าเดิม (แสดง overlay + gate)
  var u = window._EXEC_URL;
  if(u){
    try{ sessionStorage.setItem('bjh_force_drive','1'); }catch(e){}

    }catch(e){ navOK = false; }
    // ถ้า 600ms แล้วยังอยู่หน้าเดิม = nav ถูกบล็อก → โหลดในหน้าเดิมแทน

  try { if (typeof gasLoadData === 'function') { gasLoadData(true); return; } } catch(e){ console.error('bjhHardRefresh error:', e); }
  try { if (typeof af === 'function') af(); } catch(e){}

          }).catch(function(e){ onError(e.message || String(e)); });
      }
      sendChunk(0);
    } catch(err){ onError(err.message || String(err)); }
  });
}

function _compress(str){
  if(typeof pako === 'undefined') throw new Error('pako not loaded');
  var compressed = pako.gzip(str);
  var binary = '';
  var bytes = new Uint8Array(compressed);
  var len = bytes.byteLength;
  var CHUNK_SZ = 0x8000;
  for(var i = 0; i < len; i += CHUNK_SZ){
    binary += String.fromCharCode.apply(null, bytes.subarray(i, i+CHUNK_SZ));
  }
  return btoa(binary);
}

function _decompress(b64){
  // [v355] pako to:'string' พังเงียบกับไฟล์ใหญ่ (master 46MB) → inflate เป็น Uint8Array + TextDecoder แทน
  var binary=atob(b64);
  var bytes=new Uint8Array(binary.length);
  for(var i=0;i<binary.length;i++) bytes[i]=binary.charCodeAt(i);
  var out=pako.inflate(bytes);
  return new TextDecoder('utf-8').decode(out);
}

function mobFilterData(){

  return D.filter(function(r){
    if(_mobType&&r.t!==_mobType) return false;
    var p=_mobPeriod;
    if(p.type==='mo') return r.yr===p.yr&&r.mo===p.val;
    if(p.type==='q'){
      var qStart=(p.val-1)*3+1, qEnd=p.val*3;

function renderMobKPI(){
  var el=document.getElementById('mob-kpi'); if(!el) return;
  var MOS=['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
  var ACTUAL_F=(window.ACTUAL_FIXED&&Object.keys(window.ACTUAL_FIXED).length)?window.ACTUAL_FIXED:{};
  var CY=ETL_CUR_YR,CM=ETL_CUR_MO-1;
  // Budget per month
  var budMo=[];
  for(var bi=0;bi<12;bi++){var bv=0;['Service 1','Service 2','Service 3'].forEach(function(t){bv+=(BUD[t].SP[bi]+BUD[t].SC[bi])*1000;});budMo.push(bv);}
  // Compute monthly forecast (Ex.VAT)
  var moFC=new Array(12).fill(0);
  D.forEach(function(r){
    var mo=Number(r.fmo||r.mo||0),yr=Number(r.fyr||r.yr||0);
    if(yr!==CY||mo<1||mo>12) return;
    var i=mo-1,ok=false;
    if(i<CM-1) ok=(r.st==='Backlog');
    else if(i===CM-1) ok=['Backlog','SC Ordered','Ordered','SC Carry','SP Ordered (Ordering)','SP Forward (Ordering)'].indexOf(r.st)>=0;
    else ok=['SC Ordered','Ordered','SP Ordered (Pending)','SP Forward (Pending Order)'].indexOf(r.st)>=0||Number(r.is_sp_fix||0)===1;
    if(ok) moFC[i]+=Number(r._sp_fix_exvat||(r.px||0)/1.07||0);
  });
  for(var ai=0;ai<12;ai++){if(ACTUAL_F[ai]!==undefined)moFC[ai]=ACTUAL_F[ai];}
  // Compute monthly ordering (SC Ordered + SP Ordered - what's being ordered now)
  var moORD=new Array(12).fill(0);

  var CY=2026,CM=3;
  var html='<div style="padding:10px;display:flex;flex-direction:column;gap:8px">';
  SALES.forEach(function(sa){
    var r=D.filter(function(x){return x.sa===sa;});
    function sm(a){return a.reduce(function(s,x){ var v=x._net_excel!=null?Number(x._net_excel):(x.px?x.px/1.07:0); return s+v;},0)/1e6;}

  function _bjhFetchText(action, extra, ms){
    return new Promise(function(res, rej){
      // [v488] ต้องใช้ /exec เท่านั้น — /dev โดน CORS block (ต้อง login Google -> ไม่มี ACAO header)
      var base = window._API_URL || '';
      if(!base || base.indexOf('/exec') < 0){ rej('no-exec-url'); return; }
      if(typeof fetch !== 'function'){ rej('no-fetch'); return; }
      var url = base + (base.indexOf('?')>=0 ? '&' : '?') + 'action=' + action + (extra || '');
      var ctl = null, opt = {};
      try{ if(typeof AbortController === 'function'){ ctl = new AbortController(); opt.signal = ctl.signal; } }catch(e){}
      var t = setTimeout(function(){ try{ ctl && ctl.abort(); }catch(e){} rej('timeout'); }, ms || 60000);
      fetch(url, opt)
        .then(function(r){ if(!r.ok) throw new Error('HTTP ' + r.status); return r.text(); })
        .then(function(txt){ clearTimeout(t); res(txt); })
        .catch(function(err){ clearTimeout(t); rej((err && err.message) || String(err)); });
    });
  }

  function _bjhProbeHttp(){

        var ok = String(txt||'').indexOf('pong') >= 0;
        window._bjhHttpOK = ok;
        try{ sessionStorage.setItem('bjh_http_ok', ok ? '1' : '0'); }catch(e){}
        try{ console.log('%c[v486] HTTP probe: ' + (ok ? '✅ ใช้ได้ (FAST PATH)' : '❌ ไม่ใช่ pong -> script.run')
             + ' ' + (Date.now()-t0) + 'ms', ok?'color:#22c55e;font-weight:bold':'color:#f59e0b'); }catch(e){}
        res(ok);
      }).catch(function(e){
        window._bjhHttpOK = false;
        try{ sessionStorage.setItem('bjh_http_ok','0'); }catch(_){}
        try{
          if(String(e).indexOf('no-exec-url') >= 0){

    });

        try{
          // [V479.62] FIX: getConfigForClient คืน {ok, config} → ต้องส่ง d.config (ไม่ใช่ทั้งก้อน)
          //   Console: [SA config] LAST_CONFIG keys= Array(0) ← config ว่าง!
          var d = (typeof raw === 'string') ? JSON.parse(raw) : raw;
          var cfg = (d && d.ok && d.config) ? d.config : (d && d.config) ? d.config : d;
          if(typeof applyConfig === 'function') applyConfig(cfg);
          window._LAST_CONFIG = cfg || {};
          try{ console.log('[FULL RELOAD] config keys:', Object.keys(cfg||{}).length); }catch(e){}
        }catch(e){ try{ console.warn('config parse:', e.message); }catch(_){} }
        _mark('config'); res();
      }).withFailureHandler(function(e){ rej('Config: ' + (e && e.message || e)); })
       .getConfigForClient();
    });
  }

  function stepMaster(){
    return new Promise(function(res, rej){
      var _apply = function(raw){
        try{
          // [V479.62] FIX: ต้อง JSON.parse ก่อน แล้วส่ง d.content (ไม่ใช่ payload ทั้งก้อน)
          //   Console: _applyMasterData ERROR: Failed to execute 'atob' — string not correctly encoded
          var d = (typeof raw === 'string') ? JSON.parse(raw) : raw;
          if(!d || !d.ok || !d.content){
            rej('Master: ' + (d && d.error || 'ไม่มีข้อมูล'));
            return;
          }
          // _applyMasterData(content, onReady) — รอ callback (transform แบบ chunked)
          _applyMasterData(d.content, function(){
            // [v481] เดิม: ถ้า _decompress พัง (pako ไม่โหลด) _applyMasterData จะ catch เงียบ
            //   แล้วเรียก onReady() -> stepMaster resolve ทั้งที่ master ว่างเปล่า -> พังเงียบ
            //   ตอนนี้ตรวจจริงว่า contracts เข้ามาไหม -> fail ดัง ๆ ให้เห็น
            var _n = (window._jsupContract && window._jsupContract.length) || 0;
            if(!_n){
              rej('Master: โหลดไม่สำเร็จ (contracts=0)'
                  + (typeof pako === 'undefined' ? ' — pako ยังไม่โหลด' : ' — decompress/parse ล้มเหลว'));
              return;
            }
            try{ window._bjhMasterTs = d.timestamp; }catch(e){}
            try{ if(window._bootMark) window._bootMark('master'); }catch(e){}
            try{ _bjhMarkLazy('sp'); _bjhMarkLazy('install'); _bjhMarkLazy('master'); }catch(e){}
            _mark('master');
            res();
          });
        }catch(e){ rej('Master apply: ' + e.message); }
      };
      // fallback: google.script.run
      var _viaRun = function(){
        var r = _gsRun();
        if(!r){ rej('ไม่พบ Apps Script'); return; }
        r.withSuccessHandler(_apply)
         .withFailureHandler(function(e){ rej('Master: ' + (e && e.message || e)); })
         .getDataForClientMaster();
      };
      // [v486] ใช้ผล HTTP ถ้ามี
      if(window._masterHttp){ var m = window._masterHttp; window._masterHttp = null; _apply(m); return; }
      if(window._masterHttpPending){ window._masterHttpCb = _apply; window._masterHttpErr = _viaRun; return; }
      _viaRun();
    });
  }

  // [V479.55] TX + ETL: ใช้ gasLoadData(true) ของเดิม (ทำงานได้อยู่แล้ว) แล้วรอ flag _etlDoneOK
  //   (ไม่ rewrite ETL เอง — เสี่ยงพัง ; แค่ทำให้ "รอจนเสร็จ" แทนที่จะปล่อย async)
  function stepTxEtl(){
    return new Promise(function(res, rej){
      try{
        window._etlDoneOK = false;
        try{ sessionStorage.setItem('bjh_force_drive','1'); }catch(e){}  // บังคับดึงสด (ไม่ใช้ cache)
        if(typeof gasLoadData !== 'function'){ rej('ไม่พบ gasLoadData'); return; }
        gasLoadData(true);   // force = โหลดจาก Drive (ไม่ใช้ cache)
        _mark('tx');

        // [V479.56] รอ ETL เสร็จ — _etlDoneOK (หลัก) หรือ _etlDataReady + D พร้อม (backup)
        var t0 = Date.now();
        var iv = setInterval(function(){
          var dLen = (window.D && window.D.length) || 0;
          var ok = window._etlDoneOK || (window._etlDataReady && dLen > 0 && (Date.now()-t0) > 3000);
          if(ok){
            clearInterval(iv);
            // [v482] จบด้วยเงื่อนไขไหน? ถ้าเป็น backup แปลว่า _etlDoneOK ไม่ถูก set -> เสียเวลาฟรี >=3s
            try{
              console.log('%c[FULL RELOAD] ETL จบด้วย: ' + (window._etlDoneOK ? '_etlDoneOK (ปกติ)' : '_etlDataReady + 3s backup ⚠️ เสียเวลาฟรี'),
                          window._etlDoneOK ? 'color:#22c55e' : 'color:#f59e0b;font-weight:bold');
            }catch(e){}
            // [V479.66] เรียกผ่าน _spSyncData() — retry จนกว่า contracts จะมา (master โหลดแยก/ช้ากว่า tx)
            try{ if(window._spSyncData) window._spSyncData('etl'); }catch(e){ try{ console.warn('spLoadData:', e.message); }catch(_){} }
            _mark('etl');
            res();
            return;
          }
          if(Date.now() - t0 > 120000){
            clearInterval(iv);
            rej('ETL timeout (2 นาที) — ลองกด Update อีกครั้ง');
          }
        }, 250);
      }catch(e){ rej('TX/ETL: ' + e.message); }
    });
  }

  function stepActual(){
    return new Promise(function(res){
      var r = _gsRun();
      if(!r){ window._saActData = window._saActData || {}; _mark('actual'); res(); return; }
      var yr = window.CUR_YR || (new Date().getFullYear());
      r.withSuccessHandler(function(x){
        try{
          var d = (typeof x === 'string') ? JSON.parse(x) : x;
          window._saActData = (d && d.ok && d.data) ? d.data : {};
        }catch(e){ window._saActData = {}; }
        _mark('actual'); res();
      }).withFailureHandler(function(){
        window._saActData = window._saActData || {};
        _mark('actual'); res();   // ไม่ reject — ไม่มี FAD ก็ยังใช้ได้
      }).loadSalesActual(yr);
    });
  }

  function stepLowFc(){
    return new Promise(function(res){
      var r = _gsRun();
      if(!r){ window._FC_LOW_ITEMS = window._FC_LOW_ITEMS || {}; _mark('lowfc'); res(); return; }
      r.withSuccessHandler(function(x){
        try{
          var d = JSON.parse(x || '{}');
          var bag = window._FC_LOW_ITEMS || {};
          Object.keys(bag).forEach(function(k){ delete bag[k]; });
          var CY = window.CUR_YR || new Date().getFullYear();
          if(d.ok && Array.isArray(d.items)){
            d.items.forEach(function(it){
              bag[it.qn] = { qn:it.qn, cu:it.cu, brand:it.brand, sa:it.sa,
                             amt:parseFloat(it.amt||0), yr:parseInt(it.yr)||CY, mo:12,
                             isSP: it.isSP ? 1 : 0 };
            });
          }
          window._FC_LOW_ITEMS = bag;
          if(typeof window._spFcApplyLow === 'function') window._spFcApplyLow();
        }catch(e){}
        _mark('lowfc'); res();
      }).withFailureHandler(function(){
        window._FC_LOW_ITEMS = window._FC_LOW_ITEMS || {};
        _mark('lowfc'); res();
      }).getLowProspects();
    });
  }

  function stepRender(){
    return new Promise(function(res){
      // [V479.57] heal ให้ converge ก่อน render (Console: ก่อน heal ใบผิด 17/230 → หลัง heal 0/230)
      //   การ์ด render จาก D ก่อน heal → ใช้ px เก่า → ตัวเลขเกิน
      try{
        for(var i=0; i<5; i++){
          var n = window._fcHealLowPx ? window._fcHealLowPx() : 0;
          if(!n) break;
        }
      }catch(e){}
      try{ if(typeof af === 'function') af(); }catch(e){}
      try{ if(typeof buildSummary === 'function') buildSummary(); }catch(e){}
      try{ if(typeof window.dbRender === 'function') window.dbRender(); }catch(e){}
      try{ if(typeof window.homeRender === 'function' && window._homeLastD) window.homeRender(window._homeLastD); }catch(e){}
      try{ if(typeof spRenderPipeline === 'function') spRenderPipeline(); }catch(e){}
      _mark('render');
      setTimeout(res, 150);
    });
  }

  // ── MAIN: full reload (sequential) ──
  window.bjhFullReload = function(){
    if(window._frRunning) return;
    window._frRunning = true;
    _done = {};
    try{ window._etlDoneOK = false; window._etlDataReady = false; }catch(e){}   // [V479.56] reset
    try{ window._realQNCache = null; window._realQNCacheN = 0; }catch(e){}      // [V479.58] reset guard cache
    // [V479.59] ล้าง cache ทิ้ง — บังคับดึงจาก Drive ทั้งหมด (user: "ขอเรื่องตรงก่อน ไม่เก็บ cache")
    //   cache ให้ข้อมูลไม่ตรงกับ Drive (BL Confirm หาย, items ต่าง) → user เห็นเลขคนละอย่าง
    try{
      if(window.indexedDB){
        try{ indexedDB.deleteDatabase('bjh_cache'); }catch(e){}
        try{ indexedDB.deleteDatabase('bjh_dashboard'); }catch(e){}
      }
      try{ localStorage.removeItem('bjh_cache'); }catch(e){}
      try{ localStorage.removeItem('bjh_master_cache'); }catch(e){}
      try{ sessionStorage.setItem('bjh_force_drive','1'); }catch(e){}
      window._bjhCacheDisabled = true;   // flag: ห้ามใช้ cache
    }catch(e){}
    _ui();
    _render();

    var t0 = Date.now();
    _tMark = {};
    // [v482] config + actual + lowfc = Sheet fetch อิสระ 3 ตัว ไม่ต้องรอกัน -> ยิงขนาน
    //   วัดจริง V481: config=4.9s + actual=2.5s + lowfc=3.4s = 10.8s (เรียงกัน)
    //   ขนาน -> max(4.9, 2.5, 3.4) ~ 5s  => ประหยัด ~6s
    //   ปลอดภัย: ทั้งสามจบก่อน stepMaster/stepTxEtl เสมอ (Promise.all)
    //     - config  -> ETL ต้องใช้ (_LAST_CONFIG)  -> พร้อมก่อน ETL ✓
    //     - actual  -> ใช้แค่ตอน render             -> พร้อมก่อน render ✓
    //     - lowfc   -> _spFcApplyLow() มี guard if(!window.D) return 0 -> no-op ตอนนี้
    //                  แล้ว init() ใน overrides เรียก _spFcApplyLow() ซ้ำหลัง ETL อยู่แล้ว ✓
    // [v485] ลด concurrency ที่ t=0 (V484: ยิง 4 call พร้อมกัน -> contention -> config 4.2s -> 14.6s)
    //   phase 1: getBootBundle() 1 call  (config+actual+lowfc+edits+notes)
    //   phase 2: master ‖ TX prefetch    (2 Drive call หนัก — ขนานกันเอง ไม่ไปแย่ง sheet)
    //   phase 3: ETL (~1s เท่านั้น! วัดแล้ว) -> overrides (local, 0 call) -> render
    stepPako()
      .then(function(){
        // [C14] ตัด probe (?action=ping) ทิ้ง — วัดจริง 3409ms (Apps Script cold start ล้วน ๆ)
        //   ยิง 3 fetch จริงเลย -> ถ้าพัง แต่ละตัว fallback google.script.run เอง (มีครบอยู่แล้ว)
        try{
          var _b = window._API_URL || '';
          window._bjhHttpOK = !!(_b && _b.indexOf('/exec') >= 0 && typeof fetch === 'function');
          if(window._bjhHttpOK){
            console.log('%c[C14] HTTP FAST PATH (ยิงตรง ไม่ probe)', 'color:#22c55e;font-weight:bold');
            _bjhStartHttp();
          } else {
            console.warn('%c[C14] ยังไม่ได้ตั้ง URL /exec -> ใช้ google.script.run\n'
              + '   แก้: Apps Script Editor -> รัน bjhSaveExecUrl() -> Deploy -> New Version',
              'color:#f59e0b;font-weight:bold');
          }
        }catch(e){ window._bjhHttpOK = false; }
      })
      .then(stepBoot)
      .then(function(){
        if(!window._bjhHttpOK) stepPrefetchTx();   // script.run path เท่านั้น (HTTP ยิงไปแล้ว)
        return stepMaster();
      })
      .then(stepTxEtl)
      .then(stepOverrides)                    // ใช้ edits+notes จาก bootBundle -> ไม่ยิง server
      .then(stepRender)
      .then(function(){
        try{
          // [v484] เก็บเวลาโหลด -> โชว์บน badge ให้ user เห็น
          try{
            window._bjhLoadSecs = ((Date.now()-t0)/1000).toFixed(1);
            window._bjhLoadDoneAt = new Date();
            if(window._bjhUpdateBadge) window._bjhUpdateBadge();
          }catch(e){}
          console.log('%c[FULL RELOAD] เสร็จสมบูรณ์ ' + ((Date.now()-t0)/1000).toFixed(1) + 's — ข้อมูลตรงกันทุกเครื่อง', 'color:#22c55e;font-weight:bold');
          // [v482] breakdown — sheets 3 ตัวรันขนาน -> คิดเป็นกลุ่มเดียว (ใช้ตัวที่ช้าสุด)
          var _S = function(a,b){ return ((b-a)/1000).toFixed(1) + 's'; };
          var _pg = Math.max(_tMark.config||0, _tMark.actual||0, _tMark.lowfc||0);
          var _prev = _pg || t0, _parts = [];
          if(_pg) _parts.push('sheets=' + _S(t0, _pg));
          ['master','tx','etl','override','render'].forEach(function(k){
            if(_tMark[k]){ _parts.push(k + '=' + _S(_prev, _tMark[k])); _prev = _tMark[k]; }
          });
          console.log('%c[FULL RELOAD] breakdown: ' + _parts.join('  |  '), 'color:#0ea5e9;font-weight:bold');
          if(_pg){
            console.log('%c[FULL RELOAD] sheets (ขนาน): config=' + _S(t0,_tMark.config)
              + '  actual=' + _S(t0,_tMark.actual) + '  lowfc=' + _S(t0,_tMark.lowfc), 'color:#94a3b8');
          }
          try{ if(window._txT && window._txT.done) console.log('%c[TX] ' + window._txT.done, 'color:#f59e0b;font-weight:bold'); }catch(e){}
        }catch(e){}
        window._frRunning = false;
        // แสดง 100% ให้เห็นสักครู่ก่อนปิด
        setTimeout(_close, 500);
      })
      .catch(function(err){
        try{ console.error('[FULL RELOAD] ล้มเหลว:', err); }catch(e){}
        window._frRunning = false;
        _fail(String(err));
      });
  };
})();

</script>
