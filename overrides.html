<script></script>

<style id="v51-override-style">
#mob-nav,#mob-kpi,#mob-fc,#mob-filter,#mob-tbl{display:none !important;}
@media (max-width:640px){#mob-nav,#mob-kpi,#mob-fc,#mob-filter,#mob-tbl{display:none !important;}#app{padding-bottom:0 !important;}html,body{overflow:hidden !important;}}
</style>
<script id="v51-override-script">
(function(){
  var CUR_YR = window.CUR_YR||(new Date().getFullYear()), CUR_MO = window.CUR_MO||(new Date().getMonth()+1), SP_FIXED_FC = 5000000;
  var BACKLOG_SB = ['ปริ้นบิลเรียบร้อย','รับบิลเรียบร้อย','คืนบิล CFD','คืนบิลเรียบร้อย','รอดำเนินการออกบิล'];
  var ORDERED_SB = ['Requested Bill','รอ Delegrate งาน','รอ Delegate งาน'];
  var OFFER_SC = ['รอใบสั่งจ้าง/รอทำสัญญา','รอใบสั่งจ้าง','รอทำสัญญา','อยู่ระหว่างทำสัญญา','ส่งเอกสารให้ลูกค้า','เอกสารรอส่งลูกค้า','มอบอำนาจ/BG'];
  function ym(y,m){ return Number(y||0)*100 + Number(m||0); }
  function isPast(y,m){ return ym(y,m) < ym(CUR_YR,CUR_MO); }
  function isCurrent(y,m){ return Number(y||0)===CUR_YR && Number(m||0)===CUR_MO; }
  function isFuture(y,m){ return ym(y,m) > ym(CUR_YR,CUR_MO); }
  function pickMonthYearFromBill(r){
    var d = (typeof etlDate==='function') ? etlDate(r.bd) : (r.bd ? new Date(r.bd) : null);
    if(d && !isNaN(d.getTime())) return {mo:d.getMonth()+1, yr:d.getFullYear()};
    return {mo:Number(r.mo||r.rbmo||r.fmo||CUR_MO), yr:Number(r.yr||r.rbyr||r.fyr||CUR_YR)};
  }
  function pickSourceMonthYear(r){
    var mo = Number(r.carry_from_mo||r.rbmo||r.om||r.fmo||r.fm||r.mo||0);
    var yr = Number(r.carry_from_yr||r.rbyr||r.oy||r.fyr||r.fy||r.yr||0);
    if(!mo || !yr){ mo = Number(r.mo||CUR_MO); yr = Number(r.yr||CUR_YR); }
    return {mo:mo, yr:yr};
  }
  function isOfferStatus(v){ v = normStatusText ? normStatusText(v) : String(v||'').trim(); return OFFER_SC.indexOf(v)>=0; }
  // [v207] no-bill ÷4: เรียกตอน render (af/getStats) ที่ window._jsupSC พร้อม; flag _nbDiv4 กันซ้ำ
  // [v209] estimate adjust: (1) no-bill SC px÷4, (2) force ธ.ค. (no-bill SC + SP Prospect t=SP/Offer + Low), (3) mark estimate
  window._applyNoBillDiv4 = function(){
    var _raw = window._jsupSC;
    if(!Array.isArray(_raw) || _raw.length===0) return;
    var _nbS = window._scBillQnSet;
    if(!_nbS){ try{ _nbS={}; for(var _i=0;_i<_raw.length;_i++){ var _q=_raw[_i]&&_raw[_i].QH_DOC_NUMBER?String(_raw[_i].QH_DOC_NUMBER).trim():''; if(_q)_nbS[_q]=1; } window._scBillQnSet=_nbS; }catch(e){ _nbS=null; } }
    if(!_nbS || !window.D) return;
    window.D.forEach(function(r){
      if(!r || r.st!=='Offer') return;
      var _qn=String(r.qn||'').trim();
      var _isNb = (r.t==='SC') && _qn && !_nbS[_qn];
      if(_isNb && !r._isLow && !r._nbDiv4){ r.px=Number(r.px||0)/4; r._nbDiv4=true; }
      var _toDec = _isNb || (r.t==='SP') || r._isLow;
      if(_toDec && !r._estMo){ r._origMo=r.mo; r._origYr=r.yr; r.mo=12; r.yr=(window.CUR_YR||r.yr); r.fmo=12; r.fyr=r.yr; r.fm=12; r.fy=r.yr; r._estMo=true; } // [v377] sync fmo/fyr — เดิม MFC (อ่าน fmo) ยังนับเดือนเก่า
      if(_isNb || r._isLow){ r._isEstimate=true; }
    });
  };
  function normalizeStatusV51(r){
    // Forecast SP records (sp_fix) — ห้าม normalize, เก็บ st='Forecast SP' ไว้เดิม
    if(r && (r.st==='Forecast SP' || Number(r.is_sp_fix||0)===1)){
      r.fmo=r.mo; r.fyr=r.yr; r.fm=r.mo; r.fy=r.yr;
      return r;
    }
    var sb = String(r.sb||'').trim();
    var sc = String(r.sc||'').trim();
    var sn = String(r.sn||'').trim();
    var src = pickSourceMonthYear(r);
    var bill = pickMonthYearFromBill(r);
    r.qs = r.qs || '';
    r.carry_from_mo = src.mo; r.carry_from_yr = src.yr;
    r.om = src.mo; r.oy = src.yr;
    r.display_month_label = (MO[src.mo]||src.mo) + ' ' + src.yr;

    if(r.st === 'Excluded' || /Excluded/i.test(r.ip||'') || (r.t==='SC' && (String(r.sc||'').trim()==='ยกเลิกสัญญา' || String(r.sb||'').trim()==='Bill Not Print'))){
      r.st='Excluded';
      r.mo = src.mo; r.yr = src.yr;
      return r;
    }

    if(r.t==='SC'){
      if(_hasHMStage(r)){
        if(r.bn){
          var _dOff3=r.bd?new Date(r.bd):null;
          if(_dOff3&&!isNaN(_dOff3)){ r.mo=_dOff3.getMonth()+1; r.yr=_dOff3.getFullYear(); r.fmo=r.mo; r.fyr=r.yr; }
          r.st='Billed'; r.ip='SC Pending';
        } else { r.st='Offer'; r.ip=(sn==='Completed')?'PM Completed':(sn==='Canceled')?'Cancel PM':'Waiting PM';
          if(isPast(src.yr, src.mo)){ r.mo = CUR_MO; r.yr = CUR_YR; } else { r.mo = src.mo; r.yr = src.yr; }
        }
      }else if(r.bn || BACKLOG_SB.indexOf(sb)>=0 || r.st==='Backlog' || r.st==='Billed' || r.st==='Actual FAD' || r.st==='Actual FAD (CN)' || r.st==='Actual FAD (Not Found)'){
        if(r._excel_mapped) return r; // excel mapped → ไม่แตะ

        if(r.bn && _hasHMStage(r)){
          r.st='SC Offer'; r.ip=(sn==='Completed')?'PM Completed':(sn==='Canceled')?'Cancel PM':'Waiting PM';
          if(isPast(src.yr, src.mo)){ r.mo=CUR_MO; r.yr=CUR_YR; }
          else { r.mo=src.mo; r.yr=src.yr; }
          return r;
        }
        r.st = r.bn ? 'Billed' : 'Backlog';
        if(r.bn && r.bd){ r.mo = bill.mo; r.yr = bill.yr; }
        else if(!r.bn){ r.mo = CUR_MO; r.yr = CUR_YR; } // ไม่มีเลขบิล → CUR_MO
        else if(!r.mo || !r.yr){ r.mo = src.mo; r.yr = src.yr; }
        // [v357] Bill Merge → จัดการใน post-pass _bjhApplyMergeBilled (หลัง D ครบ + map พร้อม)
        if(!r.ip || /FAD|Actual|Bill Confirmed|Await FAD|Await Billing|SC Billed|SC Billing/i.test(r.ip)){
          r.ip = (sb==='รอดำเนินการออกบิล') ? 'SC Billing' : (r.bn ? 'SC Billed' : 'SC Billing');
        }
      }else if(ORDERED_SB.indexOf(sb)>=0 || r.st==='Ordered' || r.st==='Carry On'){
        r.mo = src.mo; r.yr = src.yr;
        if(isPast(src.yr, src.mo)){
          if(sn==='Completed'){
            r.st='SC Carry';
            r.ip='Waiting Bill';
          }else{
            r.st='SC Carry (Pending)';
            r.ip=(sn==='Canceled')?'Cancel PM':'Waiting PM';
          }
          r.mo = CUR_MO; r.yr = CUR_YR;
        }else{
          r.st='SC Ordered';
          r.ip=(sn==='Completed')?'Waiting Bill':(sn==='Canceled'?'Cancel PM':'Waiting PM');
        }
      }else if(!r.st || r.st==='Actual' || r.st==='SP Forward'){
        r.st = 'Data Issue';
        if(!r.ip) r.ip = 'SC:Data Issue';
        r.mo = src.mo; r.yr = src.yr;
      } } else {

      if(r.is_sp_fix===1 || r.ip==='SP Forecast'){
        r.fmo=r.mo; r.fyr=r.yr; r.fm=r.mo; r.fy=r.yr;
        return r;
      }
      if(r.st==='Backlog' || r.st==='Billed' || r.st==='Actual FAD' || /^36\d+/.test(normBill(r.bn||'')) || (r.sb && r.bd)){
        if(r._excel_mapped) return r; // excel mapped → ไม่แตะ
        r.st = r.bn ? 'Billed' : 'Backlog';
        r.mo = bill.mo; r.yr = bill.yr;
        if(!r.ip || (/FAD|Bill Confirmed|Await FAD|SP Billed|SP Billing/i.test(r.ip) && r.ip!=='Bill Merge')){
          r.ip = (r.sb==='รอดำเนินการออกบิล') ? 'SP Billing' : 'SP Billed';
        }
      } else if(String(r.st||'').indexOf('SP Forward')===0||String(r.st||'').indexOf('SP Ordered')===0){
        r.mo = src.mo; r.yr = src.yr;
        if(r.ip==='RP:Stock In' || r.ip==='RP:Wait Stock-In') r.st='SP Ordered (Ordering)';
        else r.st='SP Ordered (Pending)';
      } else if(r.st==='Excluded'){
        r.mo = src.mo; r.yr = src.yr;
      } else if(r.st==='Prospect'){
        // [v370] fix regression v369 — 'Prospect' (Customer Accept, ยังไม่มี PO) เคยตกไป else 'Data Issue'
        r.mo = src.mo; r.yr = src.yr;
      } else {
        r.st = 'Data Issue';
        if(!r.ip) r.ip = 'SP:Data Issue';
        r.mo = src.mo; r.yr = src.yr;
      }
    }
    r.fmo = r.mo; r.fyr = r.yr; r.fm = r.mo; r.fy = r.yr;
    r.is_carry = (r.st==='SC Carry' || r.st==='SC Carry (Pending)') ? 1 : 0;
    r.co_ready = (r.st==='SC Carry') ? 1 : 0;

    var SKIP_OD=['Backlog','Billed','Actual FAD','Actual FAD (CN)','Actual FAD (Not Found)','Excluded','Data Issue','CN'];
    if(SKIP_OD.indexOf(r.st)<0 && r.mo && r.yr && isPast(r.yr, r.mo)){
      r.overdue_mo = r.mo; r.overdue_yr = r.yr;  // เก็บเดือนเดิมไว้แสดง
      r.mo = CUR_MO; r.yr = CUR_YR;
      r.fmo = CUR_MO; r.fyr = CUR_YR; r.fm = CUR_MO; r.fy = CUR_YR;
      r.overdue = 1;
    } else {
      r.overdue = 0;
    }
    return r;
  }

  stCls = function(s){
    if(s==='Backlog') return 'bst-backlog';
    if(s==='SC Ordered' || s==='Ordered' || s==='SC Carry' || s==='SC Carry (Pending)') return 'bst-ordered';
    if(s==='SP Ordered (Ordering)' || s==='SP Ordered (Pending)' || s==='SP Forward (Ordering)' || s==='SP Forward (Pending Order)') return 'bst-spfwd';
    if(s==='Excluded' || s==='Data Issue') return 'bst-backlog';
    return 'bst-offer';
  };

  periodLabel = function(r){
    // ── Prospect (Offer) ที่ยังไม่มีงวดบิลใน RAW_SC_BILL → "ยังไม่มีกำหนดงวดบิล" ──
    // (แค่ข้อความ ไม่กระทบการคำนวณยอด)
    if(r && (r.st==='Offer'||r.st==='SC Offer') && !r._isLow){
      try{
        // สร้าง Set ของ qn ที่มีงวดใน RAW_SC_BILL ครั้งเดียว (cache)
        if(!window._scBillQnSet || window._scBillQnSetSrc!==window._jsupSC){
          var _set={}; var _arr=window._jsupSC||[];
          for(var _i=0;_i<_arr.length;_i++){
            var _q=_arr[_i]&&_arr[_i].QH_DOC_NUMBER?String(_arr[_i].QH_DOC_NUMBER).trim():'';
            if(_q) _set[_q]=1;
          }
          window._scBillQnSet=_set; window._scBillQnSetSrc=window._jsupSC;
        }
        var _qn=String(r.qn||'').trim();
        if(_qn && !window._scBillQnSet[_qn]){
          return '<span style="color:var(--mu);font-size:11px;font-style:italic">ยังไม่มีกำหนดงวดบิล</span>';
        }
      }catch(e){}
    }
    // Low Prospect — แสดง "Low Prospect → ธ.ค. 2026" สีเหลือง
    if(r&&r._isLow){
      var _lMo=Number(r.mo||0), _lYr=Number(r.yr||0);
      var _lNowD=new Date(), _lNowMo=_lNowD.getMonth()+1, _lNowYr=_lNowD.getFullYear();
      var _lKey=_lYr*12+_lMo, _lNowKey=_lNowYr*12+_lNowMo;
      var _lShift='', _lOrig='';
      if(_lMo && _lKey<_lNowKey){ _lOrig=(MO[_lMo]||_lMo)+' '+(_lYr||''); _lShift=r._manual_edit?'manual':'logic'; _lMo=_lNowMo; _lYr=_lNowYr; }
      else if(r._manual_edit && _lMo){ _lShift='manual'; _lOrig=(r._orig_mo?(MO[r._orig_mo]||r._orig_mo)+' '+(r._orig_yr||_lYr):''); }
      var _moLblL=_lMo?((MO[_lMo]||_lMo)+' '+(_lYr||'')):'';
      var _lOut='<span style="color:#fbbf24;font-weight:600">Low</span>';
      if(_moLblL){
        _lOut+='<span style="color:var(--mu);font-size:10px">&nbsp;&nbsp;</span>';
        if(_lShift){
          var _lIco=_lShift==='logic'?'🔄':'✋';
          var _lShCol=_lShift==='logic'?'#fbbf24':'#4ade80';
          _lOut+='<span title="'+(_lShift==='logic'?'เลื่อนอัตโนมัติ':'ย้ายเอง')+'">'+_lIco+' </span>';
          if(_lOrig) _lOut+='<span style="color:var(--mu);font-size:11px">'+_lOrig+'</span><span style="color:var(--mu);font-size:10px"> → </span>';
          _lOut+='<span style="color:'+_lShCol+';font-weight:600">'+_moLblL+'</span>';
        } else { _lOut+='<span style="color:var(--ac2);font-weight:600">'+_moLblL+'</span>'; }
      }
      return _lOut;
    }
    // High/Medium Prospect — เช็คทั้ง r.sc (สัญญา) และ r.qs (ใบเสนอราคา)
    if(r && (r.st==='Offer' || r.st==='SP Ordered (Pending)') && (r.sc||r.qs)){
      var _hmMapX=(window._FC_HM_STATUS_LOCAL||{});
      var _scKeyX=String(r.sc||'').trim();
      var _qsKeyX=String(r.qs||'').trim();
      var _hmStgX=(_scKeyX?_hmMapX[_scKeyX]:null)||(_qsKeyX?_hmMapX[_qsKeyX]:null)||null;
      if(_hmStgX==='H'||_hmStgX==='M'){
        var _hmColX=_hmStgX==='H'?'#f87171':'#fb923c';
        var _hmLblX=_hmStgX==='H'?'High':'Medium';
        var _hmMoX=Number(r.rbmo||r.carry_from_mo||r.om||r.mo||0);
        var _hmYrX=Number(r.rbyr||r.carry_from_yr||r.oy||r.yr||0);
        var _nowDX=new Date(); var _nowMoX=_nowDX.getMonth()+1, _nowYrX=_nowDX.getFullYear();
        var _hmKeyX=_hmYrX*12+_hmMoX, _nowKeyX=_nowYrX*12+_nowMoX;
        var _shiftX='', _origX='';
        if(_hmMoX && _hmKeyX<_nowKeyX){ _origX=(MO[_hmMoX]||_hmMoX)+' '+(_hmYrX||''); _shiftX=r._manual_edit?'manual':'logic'; _hmMoX=_nowMoX; _hmYrX=_nowYrX; }
        else if(r._manual_edit && _hmMoX){ _shiftX='manual'; _origX=(r._orig_mo?(MO[r._orig_mo]||r._orig_mo)+' '+(r._orig_yr||_hmYrX):''); }
        var _moHMX=_hmMoX?((MO[_hmMoX]||_hmMoX)+' '+(_hmYrX||'')):'';
        var _outX='<span style="color:'+_hmColX+';font-weight:600">'+_hmLblX+'</span>';
        if(_moHMX){
          _outX+='<span style="color:var(--mu);font-size:10px">&nbsp;&nbsp;</span>';
          if(_shiftX){
            var _icoX=_shiftX==='logic'?'🔄':'✋';
            var _shColX=_shiftX==='logic'?'#fbbf24':'#4ade80';
            _outX+='<span title="'+(_shiftX==='logic'?'เลื่อนอัตโนมัติ':'ย้ายเอง')+'">'+_icoX+' </span>';
            if(_origX) _outX+='<span style="color:var(--mu);font-size:11px">'+_origX+'</span><span style="color:var(--mu);font-size:10px"> → </span>';
            _outX+='<span style="color:'+_shColX+';font-weight:600">'+_moHMX+'</span>';
          } else { _outX+='<span style="color:var(--ac2);font-weight:600">'+_moHMX+'</span>'; }
        }
        return _outX;
      }
    }
    if(r._noDate) return '\u2014'; // inject จาก RAW_Quotation ยังไม่มีงวดบิล
    var mo = Number(r.mo||0), yr = Number(r.yr||0);
    if(!mo) return '—';
    var base = (MO[mo]||mo)+' '+(yr||'');

    if(r.t==='SP' && (r.st==='SP Ordered (Pending)' || r.st==='SP Ordered (Ordering)' || r.st==='Backlog' || r.st==='Billed' || r.st==='Actual FAD' || r.st==='Actual FAD (CN)' || r.st==='Actual FAD (Not Found)')){
      var _dlvRawX=r.delivery||'';
      if(_dlvRawX){
      var _dd=null;
      var _s=String(_dlvRawX).trim();
      try {
        if(/^\d{4}-\d{1,2}-\d{1,2}/.test(_s)){
          _dd = new Date(_s);
        } else if(/^\d{1,2}[\/\-]\d{1,2}[\/\-]\d{4}/.test(_s)){
          var _p=_s.split(/[\/\-\s]/);
          var _dy=parseInt(_p[0],10), _mo=parseInt(_p[1],10), _yr=parseInt(_p[2],10);
          if(_yr>2400) _yr-=543;
          _dd = new Date(_yr, _mo-1, _dy);
        } else {
          _dd = new Date(_s);
        }
      } catch(e){ _dd=null; }
      if(_dd && !isNaN(_dd.getTime())){
      var _today=new Date(); _today.setHours(0,0,0,0);
      _dd.setHours(0,0,0,0);
      var _diff=Math.floor((_dd-_today)/(1000*60*60*24));
      // สีเตือน: แดง=เลยกำหนดเท่านั้น, เหลือง=เดือนนี้+เดือนถัดไป, เทา=เกินกว่านั้น
      // ยกเว้น: ถ้า Billed + bill date (bd) ≤ delivery → ไม่แดง (ออกบิลทัน)
      var _dKey=_dd.getFullYear()*12+_dd.getMonth();
      var _tKey=_today.getFullYear()*12+_today.getMonth();
      var _isWarnMo=(_dKey===_tKey || _dKey===_tKey+1);
      var _billOnTime=false;
      if(r.st==='Billed' && r.bd){
        try {
          var _bdS=String(r.bd).trim(), _bdD=null;
          if(/^\d{4}-\d{1,2}-\d{1,2}/.test(_bdS)) _bdD=new Date(_bdS);
          else if(/^\d{1,2}[\/\-]\d{1,2}[\/\-]\d{4}/.test(_bdS)){
            var _bp=_bdS.split(/[\/\-\s]/);
            var _by=parseInt(_bp[2],10); if(_by>2400) _by-=543;
            _bdD=new Date(_by, parseInt(_bp[1],10)-1, parseInt(_bp[0],10));
          } else _bdD=new Date(_bdS);
          if(_bdD && !isNaN(_bdD.getTime())){
            _bdD.setHours(0,0,0,0);
            if(_bdD.getTime() <= _dd.getTime()) _billOnTime=true;
          }
        } catch(e){}
      }
      var _col=(_diff<0 && !_billOnTime)?'var(--red)':_isWarnMo?'var(--ylw2)':'#64748b';
      var _dlvLbl=_dd.getDate()+' '+(MO[_dd.getMonth()+1]||(_dd.getMonth()+1))+' '+String(_dd.getFullYear());
      if(_dd.getMonth()+1===mo && _dd.getFullYear()===yr){
        return '<span style="color:'+_col+';font-weight:600">'+_dlvLbl+'</span>';
      }
      return '<span style="color:'+_col+';font-weight:600">'+_dlvLbl+'</span>'
        +'<span style="color:var(--mu);font-size:10px"> → </span>'
        +'<span style="color:var(--ac2);font-weight:600">'+base+'</span>';
      }
      }
    }

    if(r.overdue && r.overdue_mo && r.overdue_yr){
      var fromLbl=(MO[r.overdue_mo]||r.overdue_mo)+' '+r.overdue_yr;
      return '<span style="color:var(--red);font-weight:600">'+fromLbl+' → '+base+'</span>';
    }
    var om = Number(r.om||r.carry_from_mo||0), oy = Number(r.oy||r.carry_from_yr||0);
    var isCarry = (r.st==='SC Carry'||r.st==='SC Carry (Pending)');
    var isOfferPast = (r.st==='Offer' && om && oy && (oy*100+om) < (yr*100+mo));
    if((isCarry||isOfferPast) && om && oy && (om!==mo||oy!==yr)){
      return (MO[om]||om)+' '+(oy||'')+' → '+base;
    }

    if(r.t==='SC' && r.st==='Backlog' && r.rbmo && r.rbyr){
      var rbKey=(Number(r.rbyr)*100)+Number(r.rbmo);
      var moKey=(yr*100)+mo;
      if(mo && yr && rbKey!==moKey){
        return (MO[r.rbmo]||r.rbmo)+' '+r.rbyr+' → '+(MO[mo]||mo)+' '+yr;
      }
      return (MO[r.rbmo]||r.rbmo)+' '+r.rbyr;
    }
    if(r.t==='SP' && (r.st==='SP Ordered (Pending)'||r.st==='SP Ordered (Ordering)') && (!r.delivery||r.delivery==='')){
      return '<span style="color:var(--mu);font-size:10px">รอกำหนดส่งมอบ → </span><span style="color:var(--ac2);font-weight:600">'+base+'</span>';
    }
    return base;
  };

  function includeInQuarterlyForecast(r){
    return includeInMonthlyForecast(r);
  }
  function includeInMonthlyForecast(r){
    var mo = Number(r.mo||0), yr = Number(r.yr||0);

function dpBuildSubtabs(tabs){
  var nav = '<div class="dp-subtabs">';

    nav += '<button class="dp-subtab'+(i===0?' on':'')+'" onclick="dpSwitchSub(this,\''+t.key+'\')">'

    panes += '<div class="dp-subpane'+(i===0?' on':'')+'" data-subpane="'+t.key+'">'+t.html+'</div>';

function dpSwitchSub(btn, key){
  var root = btn.closest('.dp-body');
  if(!root) return;
  root.querySelectorAll('.dp-subtab').forEach(function(b){ b.classList.remove('on'); });
  btn.classList.add('on');
  root.querySelectorAll('.dp-subpane').forEach(function(p){
    p.classList.toggle('on', p.getAttribute('data-subpane')===key);
  });
}
window.dpSwitchSub = dpSwitchSub;

// ── ดึงข้อมูลสัญญา จาก RAW_CONTRACT (match qn / CON_ID) ──
function dpGetContractInfo(r){
  var L = (typeof _buildBMLookup==='function') ? null : null;
  var contractArr = window._jsupContract || [];
  if(!Array.isArray(contractArr) || !contractArr.length) return null;
  var qn = String(r.qn||'').trim();
  var conId = String(r.sr||'').trim();
  var found = null;
  for(var i=0;i<contractArr.length;i++){
    var c = contractArr[i];
    if(!c) continue;
    var cQn = String(c.QUOTATION_NO||c.QH_DOC_NUMBER_CREATE||'').trim();
    var cId = String(c.CON_ID||'').trim();
    if((qn && cQn===qn) || (conId && cId===conId)){ found=c; break; }
  }
  return found;
}

// ── ดึงรายการงวดบิล จาก RAW_SC_BILL (match qn) ──
function dpGetBillRounds(r){
  var billArr = window._jsupSC || [];
  if(!Array.isArray(billArr) || !billArr.length) return [];
  var qn = String(r.qn||'').trim();
  var conId = String(r.sr||'').trim();
  if(!qn && !conId) return [];
  var rows = billArr.filter(function(b){
    if(!b) return false;
    var bQn = String(b.QH_DOC_NUMBER||'').trim();
    // มี QN → จับคู่ด้วย QN เท่านั้น (กัน SR/CON_ID ไปชนสัญญาลูกค้าอื่น)
    if(qn) return bQn===qn;
    // ไม่มี QN → fallback ใช้ CON_ID
    var bId = String(b.CON_ID||'').trim();
    return conId && bId===conId;
  });
  // เรียงตาม BILL_ROUND
  rows.sort(function(a,b){
    return (Number(a.BILL_ROUND||0)) - (Number(b.BILL_ROUND||0));
  });
  return rows;
}

// ── ดึงข้อมูลใบเสนอราคา จาก RAW_Quotation (match DOC_NUMBER) ──
function dpGetQuotationInfo(r){
  // [v314] SP → หาใน RAW_Quotation_SP (_jsupQuoSP) ; SC → RAW_Quotation (_jsupQuo)
  //   เดิมหา _jsupQuo อย่างเดียว → SP (qn=QSP) ไม่เจอ/match QSC ผิดใบ → qu null → _quv crash BRAND_NAME
  var qn = String(r.qn||'').trim();
  if(!qn) return null;
  var isSP = (r.t==='SP') || qn.slice(0,3).toUpperCase()==='QSP';
  var quoArr = isSP ? (window._jsupQuoSP || []) : (window._jsupQuo || []);
  if(!Array.isArray(quoArr) || !quoArr.length) return null;
  var found = null;
  for(var i=0;i<quoArr.length;i++){
    var q = quoArr[i];
    if(!q) continue;
    var k = String(q.DOC_NUMBER||q.QH_DOC_NUMBER||'').trim();
    if(k===qn){ found=q; break; }
  }
  return found;
}

// ── ดึงรายการอะไหล่ จาก RAW_SpareParts (match QH_DOC_NUMBER) ──
function dpGetSpareParts(r){
  var partsArr = window._jsupParts || [];

}

// ── format วันที่ไทย (รับ string/date) ──
function dpFmtDate(v){
  if(!v) return '—';
  var s = String(v).trim();
  if(!s || s==='nan' || s==='null' || s==='None') return '—';
  var d = null;
  try {
    if(/^\d{4}-\d{2}-\d{2}/.test(s)) d = new Date(s);
    else if(/^\d{1,2}\/\d{1,2}\/\d{4}/.test(s)){
      var parts = s.split(/[\/\s]/);
      d = new Date(parseInt(parts[2]), parseInt(parts[1])-1, parseInt(parts[0]));
    } else d = new Date(s);
  } catch(e){ return s; }
  if(!d || isNaN(d.getTime())) return s;
  var MO_TH = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
  return d.getDate()+' '+MO_TH[d.getMonth()]+' '+(d.getFullYear()+543).toString().slice(-2);
}

  function buildRulesV51(){
    var el=document.getElementById('rules-body'); if(!el) return;

    var groups={};
    RULES_DATA.forEach(function(r){ if(!groups[r.group]) groups[r.group]=[];  groups[r.group].push(r); });

    var groupColors={
      'RAW_SC_BILL':'#3b7bff',
      'RAW_SP_BILL':'#0ea5e9',
      'RAW_SpareParts':'#8b5cf6',
      'RAW_Quotation':'#f0a500',
      'RAW_Customer':'#1db954',
      'SC Status Logic':'#3b7bff',
      'SP Forward Logic':'#8b5cf6',
      'Monthly Forecast':'#f0a500',
      'Budget (Hardcoded)':'#e8344a'
    };

    var html='';

    html+='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--bd)">'
      +'<div style="font-size:13px;font-weight:700;color:var(--tx)">📋 Field Mapping & Logic Rules</div>'
      
      +'</div>';

    Object.keys(groups).forEach(function(grp){
      var color=groupColors[grp]||'#5c6b88';
      var rows=groups[grp];
      html+='<div style="margin-bottom:18px">'
        +'<div style="font-size:10px;font-weight:700;color:'+color+';text-transform:uppercase;letter-spacing:.7px;padding:5px 10px;background:var(--sur2);border-left:3px solid '+color+';border-radius:4px;margin-bottom:6px">'+grp+'</div>'
        +'<table style="width:100%;border-collapse:collapse;font-size:11px">'
        +'<thead><tr style="background:var(--sur2)">'
        +'<th style="padding:5px 8px;text-align:left;color:var(--mu);font-size:10px;border-bottom:1px solid var(--bd);width:220px">Field / ค่าที่ใช้</th>'
        +'<th style="padding:5px 8px;text-align:left;color:var(--mu);font-size:10px;border-bottom:1px solid var(--bd)">ที่มา (ไฟล์ · Sheet · Column) & หมายเหตุ</th>'
        +'</tr></thead><tbody>';
      rows.forEach(function(r,i){
        var bg=i%2===0?'':'background:var(--sur2)';
        var src='';
        if(r.file!=='—'&&r.file!=='(auto-generate)'&&r.file!=='(hardcoded in JS)'){
          src='<span style="color:var(--ac2);font-family:monospace;font-size:10px">'+r.file+'</span>'
            +' · <span style="color:var(--mu2);font-size:10px">'+r.sheet+'</span>'
            +' · <span style="color:var(--ylw2);font-family:monospace;font-size:10px">'+r.col+'</span>';
          if(r.hdr&&r.hdr!=='—') src+=' <span style="color:var(--mu);font-size:10px">(hdr '+r.hdr+')</span>';
          src+='<br>';
        } else if(r.file==='(hardcoded in JS)'||r.file==='(auto-generate)'){
          src='<span style="color:var(--org);font-size:10px">'+r.file+'</span><br>';
        }
        html+='<tr style="border-bottom:1px solid var(--bd);'+bg+'">'
          +'<td style="padding:6px 8px;font-weight:600;color:var(--tx);vertical-align:top">'+r.field+'</td>'
          +'<td style="padding:6px 8px;color:var(--mu2);vertical-align:top">'+src+'<span style="font-size:11px">'+r.note+'</span></td>'

/* ═══════════════════════════════════════════════════════════
   [V479.66] (1) _spSyncData — sync _jsupContract -> _spData (retry)
   ปัญหา: RAW_CONTRACT อยู่ใน master file (28MB) โหลดช้ากว่า tx
          -> stepTxEtl เรียก spLoadData ตอน _jsupContract ยังว่าง
          -> _spData.contracts=0 -> Contract & PO ขึ้น * ทุกแถว
   ═══════════════════════════════════════════════════════════ */
window._spSyncData = function(tag){
  /* [V479.71] FIX วนไม่จบ + spam console:
       spLoadData() เรียก spRenderAll() (อยู่ใน IIFE SalesProspect — ยังไม่ define ตอน boot)
       -> throw -> เดิม return false -> retry ทุก 500ms ไม่หยุด (log ท่วม console)
     Fix: ยึด "contracts เข้า _spData แล้วหรือยัง" เป็นเกณฑ์จบ ไม่ใช่ "render สำเร็จไหม" */
  function _try(){
    if(typeof window.spLoadData !== 'function') return false;
    var con = window._jsupContract || [];
    var quo = window._jsupQuo || [];
    if(!quo.length)  return false;   // tx ยังไม่มา
    if(!con.length)  return false;   // master ยังไม่มา -> retry ต่อ (นี่คือเหตุผลเดียวที่ควร retry)
    try{
      window.spLoadData({
        RAW_CONTRACT     : con,
        RAW_Quotation    : quo,
        RAW_Quotation_SP : (window._jsupQuoSP || []),
        RAW_SC_BILL      : (window._jsupSC || [])
      }, (window._LAST_CONFIG || {}));
    }catch(e){
      /* render ภายใน spLoadData อาจ throw (spRenderAll ยังไม่ define) — ไม่เป็นไร
         ข้อมูลถูก set เข้า _spData ไปแล้วก่อนถึงบรรทัด render */
      if(!window._spSyncWarned){ window._spSyncWarned=1; try{ console.warn('[spSync] render ยังไม่พร้อม (ข้อมูลเข้าแล้ว):', e.message); }catch(_){} }
    }
    try{ console.log('[spSync/'+(tag||'-')+'] contracts='+con.length+' quotations='+quo.length); }catch(e){}
    return true;   // contracts มาแล้ว = จบ (ไม่สนว่า render จะพังไหม)
  }
  if(_try()) return;
  if(window._spSyncIV) return;
  var t0 = Date.now();
  window._spSyncIV = setInterval(function(){
    if(_try() || Date.now()-t0 > 60000){
      clearInterval(window._spSyncIV); window._spSyncIV = null;
      // render ตอนนี้ SalesProspect พร้อมแล้ว
      try{ if(window.spRenderAll) window.spRenderAll(); }catch(e){}
      try{ if(window._spCurrentTab==='contract' && window.spRenderContract) window.spRenderContract(); }catch(e){}
    }
  }, 500);
};

/* ═══════════════════════════════════════════════════════════
   [V479.66] (2) LIGHT MODE — recolor ครอบ #v-sp + auto-contrast
   ปัญหาเดิม: _recolorInlineBg skip #v-sp -> modal SalesProspect
     (รายละเอียด QN / สั่ง SP / เข้า SC / เปิดบิล) พื้น dark ค้าง
     แต่ label ใช้ color:var(--mu) = เทาเข้ม -> เข้มบนเข้ม = หายสนิท
   Fix: (a) ไม่ skip #v-sp แล้ว  (b) auto-contrast safety net
        (c) MutationObserver จับ element ที่ render ทีหลัง (modal)
   ═══════════════════════════════════════════════════════════ */
(function(){
  function _luma(c){
    if(!c) return 255;
    var r,g,b,m;
    c = String(c).trim();
    if(c.charAt(0)==='#'){
      var h=c.slice(1);
      if(h.length===3) h=h[0]+h[0]+h[1]+h[1]+h[2]+h[2];
      if(h.length<6) return 255;
      r=parseInt(h.slice(0,2),16); g=parseInt(h.slice(2,4),16); b=parseInt(h.slice(4,6),16);
    } else if((m=c.match(/rgba?\(\s*(\d+)[,\s]+(\d+)[,\s]+(\d+)(?:[,\s/]+([\d.]+))?/))){
      r=+m[1]; g=+m[2]; b=+m[3];
      if(m[4]!==undefined && parseFloat(m[4])<0.25) return 255; // โปร่งเกือบใส -> ถือว่าพื้นสว่าง
    } else return 255;
    return 0.2126*r + 0.7152*g + 0.0722*b;
  }
  // หาพื้นหลังจริง (ไต่ขึ้น parent จนเจอตัวที่ไม่โปร่งใส)
  function _effBg(el){
    var n = el, guard = 0;
    while(n && n.nodeType===1 && guard++ < 12){
      var bg = getComputedStyle(n).backgroundColor;
      if(bg && !/rgba\([^)]*,\s*0\s*\)/.test(bg) && bg !== 'transparent'){
        var L = _luma(bg);
        if(!/rgba/.test(bg) || _alpha(bg) >= 0.5) return L;
      }
      n = n.parentElement;
    }
    return 255; // ไม่เจอ -> ถือว่าสว่าง (light mode body)
  }
  function _alpha(c){ var m=String(c).match(/rgba\([^)]*,\s*([\d.]+)\s*\)/); return m?parseFloat(m[1]):1; }

  /* (a) recolor พื้นเข้ม -> --sur2  (รวม #v-sp แล้ว) */
  function _bgPass(theme){
    var all = document.querySelectorAll('[style*="background"]');
    for(var i=0;i<all.length;i++){
      var el = all[i];
      if(theme === 'light'){
        if(el.getAttribute('data-obg')!==null) continue;
        var st = el.getAttribute('style')||'';
        var m = st.match(/background(-color)?\s*:\s*(#[0-9a-fA-F]{3,6}|rgba?\([^)]+\))/);
        if(!m) continue;
        var col = m[2];
        if(_luma(col) < 70 && _alpha(col) >= 0.5){
          el.setAttribute('data-obg', col);
          el.style.background = 'var(--sur2)';
        }
      } else {
        var ob = el.getAttribute('data-obg');
        if(ob){ el.style.background = ob; el.removeAttribute('data-obg'); }
      }
    }
  }

  /* (b) auto-contrast: ตัวอักษรจางบนพื้นสว่าง -> ดันเข้ม
        (safety net ครอบทุกหน้า/ทุก modal ที่ยังหลุด) */
  function _txPass(theme){
    var all = document.querySelectorAll('[style*="color"]');
    for(var i=0;i<all.length;i++){
      var el = all[i];
      if(theme !== 'light'){
        var oc = el.getAttribute('data-otx');
        if(oc){ el.style.color = oc; el.removeAttribute('data-otx'); }
        continue;
      }
      if(el.getAttribute('data-otx')!==null) continue;
      var cs = getComputedStyle(el);
      var fg = _luma(cs.color);
      var bgL = _effBg(el);
      // พื้นสว่าง (>=150) + ตัวอักษรสว่างเกิน (>=140) -> อ่านไม่ออก
      if(bgL >= 150 && fg >= 140){
        el.setAttribute('data-otx', el.style.color || '');
        el.style.setProperty('color', '#343b43', 'important');
      }
    }
  }

  function _pass(theme){
    try{ _bgPass(theme); }catch(e){}
    try{ _txPass(theme); }catch(e){}
  }
  window._bjhLightPass = _pass;

  /* override ตัวเดิมใน script_main (โหลดก่อน overrides -> ทับได้) */
  try{ window._recolorInlineBg = _pass; }catch(e){}

  /* (c) observer: modal render ทีหลัง -> pass ซ้ำ (debounce) */
  var _t=null;
  function _kick(){
    if(document.documentElement.getAttribute('data-theme')!=='light') return;
    clearTimeout(_t);
    _t = setTimeout(function(){ _pass('light'); }, 60);
  }
  function _boot(){
    try{
      new MutationObserver(_kick).observe(document.body, {childList:true, subtree:true});
    }catch(e){}
    if(document.documentElement.getAttribute('data-theme')==='light') _pass('light');
  }
  if(document.body) _boot();
  else document.addEventListener('DOMContentLoaded', _boot);
})();

})();

// ════════════════════════════════════════════════════════
// [v480] SLIM GUARD — ตรวจว่า ex_col= ที่ต้นทางตัด field วิกฤตทิ้งหรือไม่
//   field พวกนี้เคยอยู่ใน _SLIM_CUT_ARR (ตัดฝั่ง client หลัง ETL → ไม่พัง)
//   พอย้ายไปตัดที่ต้นทาง (SmartFlow ex_col) จะพังเงียบทันที → guard นี้จับให้เห็นใน console
//   ถ้าเจอ → เอาชื่อ field ออกจาก BJH_EX_COL ใน Code.gs แล้วรัน sync ใหม่
// ════════════════════════════════════════════════════════
window._BJH_SLIM_REQUIRED = {
  RAW_INSTALLATION : ['INSTALL_STATUS','MC_STATUS_HISTORY','CUS_ID','MC_STATUS_NAME','SN'],
  RAW_CONTRACT     : ['QH_SUBJECT_EMAIL','NOTE_LOG','PROJECT_NAME','CONTRACT_NO','SERAIL_NUMBER'],
  RAW_CUSTOMER     : ['CUS_ID','CUS_NAME','PROVINCE'],
  RAW_Quotation    : ['NOTE_LOG','SUBJECT_EMAIL','QH_GP_REMARK','QH_TOTAL_AMT'],
  RAW_Quotation_SP : ['NOTE_LOG','SUBJECT_EMAIL','QH_GP_REMARK','QH_TOTAL_AMT'],
  RAW_SC_BILL      : ['PRODUCT_NAME','BILL_JOB_PRINT_DATETIME']
};
window._bjhSlimMissing = [];
window._bjhSlimGuard = function(parsed){
  if(!parsed) return [];
  var miss = [];
  var REQ = window._BJH_SLIM_REQUIRED;
  for (var tbl in REQ){
    if(!REQ.hasOwnProperty(tbl)) continue;
    var rows = parsed[tbl];
    if(!rows || !rows.length) continue;
    var r0 = rows[0] || {};
    var need = REQ[tbl];
    for (var i=0; i<need.length; i++){
      if (!(need[i] in r0)) miss.push(tbl + '.' + need[i]);
    }
  }
  window._bjhSlimMissing = miss;
  if (miss.length){
    console.error('%c[SLIM GUARD] field วิกฤตหายไป ' + miss.length + ' ตัว — ฟีเจอร์จะพังเงียบ!',
                  'background:#c00;color:#fff;padding:2px 6px;font-weight:bold');
    console.error('[SLIM GUARD] หาย:', miss);
    console.error('[SLIM GUARD] แก้: เอาชื่อ field ออกจาก BJH_EX_COL ใน Code.gs -> Deploy -> รัน smartflowSyncToDrive()');
    try {
      var box = document.getElementById('dbg-box');
      if (box) box.innerHTML += '<div style="color:#c00;font-weight:bold">[SLIM GUARD] field หาย: ' + miss.join(', ') + '</div>';
    } catch(e){}
  } else {
    console.log('%c[SLIM GUARD] field วิกฤตครบทุกตัว', 'color:#0a0;font-weight:bold');
  }
  return miss;
};

// ════════════════════════════════════════════════════════
// [C8] คลิกเลข -> คัดลอก  (QN · SR · Contract · Serial · เลขบิล)
//   ใช้ event delegation ที่ document -> ครอบคลุมทุกตาราง/ทุก popup โดยไม่ต้องแก้ render สักจุด
//   capture phase + stopPropagation -> ไม่ไปเปิด popup ของแถว
// ════════════════════════════════════════════════════════
(function(){
  function _isNum(t){
    t = String(t == null ? '' : t).trim();
    if (t.length < 6 || t.length > 32) return false;
    if (/\s/.test(t)) return false;                       // มีช่องว่าง = ไม่ใช่เลขเอกสาร
    if (!/\d{4,}/.test(t)) return false;                  // ต้องมีตัวเลข >=4 ตัวติดกัน
    if (!/^[A-Za-z0-9][A-Za-z0-9._\/-]*$/.test(t)) return false;  // อนุญาต A-Z 0-9 . _ / -
    if (/^\d{4}-\d{2}-\d{2}/.test(t)) return false;      // กันวันที่ 2026-05-06
    return true;
  }
  function _leafText(el){
    if (!el || el.nodeType !== 1) return '';
    if (el.querySelector && el.querySelector('*')) return '';   // ต้องเป็น leaf (ไม่มี element ลูก)
    return (el.textContent || '').trim();
  }
  function _toast(msg, ok){
    var id = 'bjh-cp-toast', t = document.getElementById(id);
    if (!t) {
      t = document.createElement('div'); t.id = id;
      t.style.cssText = 'position:fixed;left:50%;bottom:28px;transform:translateX(-50%);z-index:99999;'
        + 'padding:9px 18px;border-radius:9px;font-size:12.5px;font-weight:700;font-family:inherit;'
        + 'box-shadow:0 8px 28px rgba(0,0,0,.45);pointer-events:none;opacity:0;transition:opacity .16s';
      document.body.appendChild(t);
    }
    t.textContent = msg;
    t.style.background = ok ? '#064e3b' : '#450a0a';
    t.style.color      = ok ? '#6ee7b7' : '#fca5a5';
    t.style.border     = '1px solid ' + (ok ? '#10b981' : '#ef4444');
    t.style.opacity = '1';
    clearTimeout(window._bjhCpT);
    window._bjhCpT = setTimeout(function(){ t.style.opacity = '0'; }, 1400);
  }
  function _copy(txt){
    var done = function(ok){ _toast(ok ? ('📋 คัดลอกแล้ว: ' + txt) : ('คัดลอกไม่ได้: ' + txt), ok); };
    try{
      if (navigator.clipboard && navigator.clipboard.writeText){
        navigator.clipboard.writeText(txt).then(function(){ done(true); }, function(){ _copyFallback(txt, done); });
        return;
      }
    }catch(e){}
    _copyFallback(txt, done);
  }
  function _copyFallback(txt, done){
    try{
      var ta = document.createElement('textarea');
      ta.value = txt;
      ta.style.cssText = 'position:fixed;top:-999px;left:-999px;opacity:0';
      document.body.appendChild(ta); ta.focus(); ta.select();
      var ok = document.execCommand('copy');
      document.body.removeChild(ta);
      done(!!ok);
    }catch(e){ done(false); }
  }

  // hover: บอกให้รู้ว่ากดได้
  document.addEventListener('mouseover', function(e){
    var el = e.target;
    if (!el || el.nodeType !== 1 || el.dataset.bjhCp) return;
    var t = _leafText(el);
    if (!_isNum(t)) return;
    el.dataset.bjhCp = '1';
    el.style.cursor = 'pointer';
    el.style.textDecoration = 'underline dotted';
    el.style.textUnderlineOffset = '3px';
    if (!el.title) el.title = '📋 คลิกเพื่อคัดลอก';
  }, true);

  // click (capture) -> copy + กันไม่ให้ไปเปิด popup ของแถว
  document.addEventListener('click', function(e){
    var el = e.target;
    var t = _leafText(el);
    if (!_isNum(t)) return;
    e.preventDefault();
    e.stopPropagation();
    _copy(t);
  }, true);
})();

   [V522] Sales Confirm รายบรรทัด — ใช้ในหน้า 🛒 สั่ง SP · 📥 เข้า SC
     แทนการเปิด ✅ Confirm Billing แล้วติ๊กทีละอัน

(function(){

  function _scfEsc(v){
    return String(v==null?'':v).replace(/[&<>"']/g,function(c){
      return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];

  //  สิทธิ์: sales กดได้เฉพาะแถวตัวเอง · manager/admin กดได้ทุกแถว

      if (!isSales) return true;                       // manager/admin
      var me = String(window._spMyName||'').trim();
      if (!me) return false;
      return String(r.sa||'').trim() === me;           // เฉพาะของตัวเอง

  }
  window._scfCanConfirm = _scfCanConfirm;

  //  cell ปุ่มในตาราง

      return '<button onclick="event.stopPropagation();_scfOpen('+idx+')" title="ยืนยันแล้ว — กดเพื่อแก้เดือน" '
        + 'style="font-size:10.5px;padding:3px 9px;border-radius:11px;border:1px solid #22c55e;'

      return '<span style="font-size:10.5px;color:var(--mu2,#6b7a9c)" title="ยืนยันได้เฉพาะงานของตัวเอง">\u2014</span>';
    }
    return '<button onclick="event.stopPropagation();_scfOpen('+idx+')" '
      + 'style="font-size:10.5px;padding:3px 9px;border-radius:11px;border:1px solid #f59e0b;'
      + 'background:transparent;color:#fbbf24;cursor:pointer;font-family:inherit;white-space:nowrap">'
      + '\u2705 Confirm</button>';
  };

  //  popup เลือกเดือน
  window._scfOpen = function(idx){
    var r = (window.D||[])[idx];
    if (!r){ alert('ไม่พบรายการ'); return; }
    if (!_scfCanConfirm(r)){ alert('ยืนยันได้เฉพาะงานของตัวเอง'); return; }

    var ov = document.getElementById('scf-overlay'); if (ov) ov.remove();
    var curMo = Number(r.rbmo || r.mo || 0) || (new Date().getMonth()+1);
    var curYr = Number(r.rbyr || r.yr || 0) || (new Date().getFullYear());
    var done  = (r.st === 'Backlog (Confirmed)') || Number(r._confirmed_billing||0)===1;

    var moOpts = '';
    for (var m=1; m<=12; m++){   //  เลือกได้ทั้งปี
      moOpts += '<option value="'+m+'"'+(m===curMo?' selected':'')+'>'+MON_TH[m]+'</option>';
    }
    var yrOpts = '';
    var y0 = (new Date().getFullYear());
    for (var y=y0-1; y<=y0+1; y++){
      yrOpts += '<option value="'+y+'"'+(y===curYr?' selected':'')+'>'+y+'</option>';
    }

    ov = document.createElement('div'); ov.id='scf-overlay';
    ov.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100001;display:flex;align-items:center;justify-content:center;padding:20px';
    ov.innerHTML =
        '<div style="background:#0f172a;border:1px solid #334155;border-radius:11px;max-width:430px;width:100%">'
      +   '<div style="padding:14px 18px;border-bottom:1px solid #334155;display:flex;justify-content:space-between;align-items:center">'

      +     '<button onclick="document.getElementById(\'scf-overlay\').remove()" style="background:transparent;border:none;color:#64748b;font-size:21px;cursor:pointer;line-height:1">\u00d7</button>'

      +     '<div style="font-size:11px;color:#64748b;margin-bottom:12px">'+_scfEsc(r.cu||'')

      +       '<select id="scf-yr" style="width:96px;background:#1e293b;border:1px solid #334155;border-radius:6px;padding:7px 9px;color:#e2e8f0;font-size:12px;font-family:inherit">'+yrOpts+'</select>'

      +     '<input id="scf-note" value="'+_scfEsc(_scfNoteOf(r))+'" placeholder="เช่น รอ PO / นัดส่งของ..." style="width:100%;background:#1e293b;border:1px solid #334155;border-radius:6px;padding:7px 9px;color:#e2e8f0;font-size:12px;font-family:inherit;box-sizing:border-box;outline:none">'
      +     '<div id="scf-msg" style="font-size:11px;margin-top:9px;min-height:15px"></div>'
      +   '</div>'
      +   '<div style="padding:12px 18px;border-top:1px solid #334155;display:flex;gap:8px;align-items:center">'
      //  [V523] ถอนยืนยัน — โผล่เฉพาะแถวที่ยืนยันแล้ว (ชิดซ้าย แยกจากปุ่มหลัก กันกดพลาด)

      +     '<button id="scf-ok" onclick="_scfSave('+idx+')" style="padding:7px 18px;border-radius:6px;border:none;background:#22c55e;color:#052e16;font-size:12px;font-weight:700;font-family:inherit;cursor:pointer">' + (done?'\ud83d\udcbe บันทึก':'\u2705 ยืนยัน') + '</button>'
      +   '</div>'
      + '</div>';
    document.body.appendChild(ov);
    try{ document.getElementById('scf-note').focus(); }catch(e){}
  };

  //  [V525] โน้ต = ตัวเดียวกับคอลัมน์ 📝 โน้ต (quote_notes) — ตัด tag เดือนออกก่อนแสดง
  function _scfNoteOf(r){
    try {
      var q = String((r&&(r.qn||r.sr))||'').trim();
      if (!q) return '';
      var t = (window._QUOTE_NOTES||{})[q] || '';
      return _scfStripTag(t);
    } catch(e){ return ''; }
  }
  //  tag เดือนที่ฝากไว้ในโน้ต: [→7/2026]  (ใช้ให้ loadData ย้ายเดือนกลับได้)
  var _SCF_TAG_RE = /\s*\[\u2192\s*(\d{1,2})\s*\/\s*(\d{4})\s*\]\s*$/;
  function _scfStripTag(t){ return String(t||'').replace(_SCF_TAG_RE,'').trim(); }
  function _scfMakeTag(note, mo, yr){
    var base = _scfStripTag(note);
    return (base ? base+' ' : '') + '[\u2192'+mo+'/'+yr+']';
  }
  window._scfStripTag = _scfStripTag;

  //  บันทึกโน้ตลง quote_notes (ที่เดียวกับคอลัมน์ 📝 โน้ต)
  function _scfSaveQuoteNote(qn, text, cb){
    try {
      var q = String(qn||'').trim();
      if (!q){ if(cb) cb(false); return; }
      window._QUOTE_NOTES = window._QUOTE_NOTES || {};
      if (text) window._QUOTE_NOTES[q] = text; else delete window._QUOTE_NOTES[q];
      if (typeof window._qnSaveConfig === 'function'){ window._qnSaveConfig(window._QUOTE_NOTES, cb||function(){}); return; }
      //  fallback — เขียน config ตรง
      if (typeof google!=='undefined' && google.script && google.script.run){
        google.script.run
          .withSuccessHandler(function(){ if(cb) cb(true); })
          .withFailureHandler(function(){ if(cb) cb(false); })
          .saveConfigSection('quote_notes', window._QUOTE_NOTES);
      } else if (cb) cb(true);

    var btn = document.getElementById('scf-undo');

    var _qn = r.qn||r.sr||'';
    if (!window.confirm('ถอนยืนยัน ' + _qn + ' ?\n\nสถานะจะกลับเป็น "' + (r._orig_st||'SC Ordered') + '"')) return;

    if (btn){ btn.disabled=true; btn.textContent='กำลังถอน...'; }

    //  ── คืนค่าใน memory ──
    var prevSt = r.st, prevCf = r._confirmed_billing;
    var prevMo = r.mo, prevYr = r.yr, prevRbmo = r.rbmo, prevRbyr = r.rbyr;
    var prevFmo = r.fmo, prevFyr = r.fyr;   // [V529]
    //  key ที่ใช้ตอนบันทึก (เดือนเดิมก่อนย้าย) — ต้องใช้ตัวนี้ถอน ไม่ใช่เดือนที่ย้ายไป
    var _mo = (r._scf_key_mo!=null ? r._scf_key_mo : (r.rbmo!=null?r.rbmo:''));
    var _yr = (r._scf_key_yr!=null ? r._scf_key_yr : (r.rbyr!=null?r.rbyr:''));
    r.st = r._orig_st || 'SC Ordered';
    r._confirmed_billing = 0;
    //  [V525] คืนเดือนเดิมด้วย (ตอน confirm ย้ายเดือนไป)
    if (r._orig_mo != null){
      r.mo = r._orig_mo; r.yr = r._orig_yr;
      //  [V529] คืน fmo/fyr ด้วย (ถ้าไม่มีค่าเดิมเก็บไว้ ให้ sync ตาม mo)
      var _ofm = (r._orig_fmo != null) ? r._orig_fmo : r._orig_mo;
      var _ofy = (r._orig_fyr != null) ? r._orig_fyr : r._orig_yr;
      r.fmo = _ofm; r.fyr = _ofy; r.fm = _ofm; r.fy = _ofy;
    }
    if (r._scf_key_mo != null){ r.rbmo = r._scf_key_mo; r.rbyr = r._scf_key_yr; }
    r._search = null;

    var myId='', myName='';
    try { myId=(window._currentUser&&window._currentUser.empId)||''; myName=(window._currentUser&&window._currentUser.name)||''; } catch(e){}

    //  payload รูปแบบเดียวกับ cbCancelConfirm (cancelled:true)
    var payload = [{ qn:_qn, month:_mo, year:_yr, cancelled:true, salesId:myId, salesName:myName }];

    function _done(errTxt){
      if (btn){ btn.disabled=false; btn.textContent='\ud83d\uddd1 ถอนยืนยัน'; }
      if (errTxt){
        //  rollback ถ้าบันทึกไม่สำเร็จ — อย่าให้จอกับ server ไม่ตรงกัน
        r.st = prevSt; r._confirmed_billing = prevCf; r._search = null;
        r.mo = prevMo; r.yr = prevYr; r.rbmo = prevRbmo; r.rbyr = prevRbyr;   // [V525] rollback เดือนด้วย
        r.fmo = prevFmo; r.fyr = prevFyr; r.fm = prevFmo; r.fy = prevFyr;     // [V529]
        if (msg){ msg.style.color='#f87171'; msg.textContent=errTxt; }
        return;
      }
      if (msg){ msg.style.color='#4ade80'; msg.textContent='\u2713 ถอนยืนยันแล้ว'; }
      setTimeout(function(){
        var ov=document.getElementById('scf-overlay'); if(ov) ov.remove();
        try{ if(typeof window.spRenderOrdSP==='function') window.spRenderOrdSP(); }catch(e){}
        try{ if(typeof window.spRenderOrdSC==='function') window.spRenderOrdSC(); }catch(e){}
        try{ if(typeof window.buildSummary==='function') window.buildSummary(); }catch(e){}
        try{ if(typeof window.af==='function') window.af(); }catch(e){}
      }, 550);
    }

    if (typeof google !== 'undefined' && google.script && google.script.run){
      google.script.run
        .withSuccessHandler(function(res){
          try {
            var j = (typeof res==='string') ? JSON.parse(res) : res;
            _done(j && j.ok ? '' : ((j && j.error) || 'บันทึกไม่สำเร็จ'));
          } catch(e){ _done('บันทึกไม่สำเร็จ'); }
        })
        .withFailureHandler(function(e){ _done('เชื่อมต่อไม่ได้: ' + ((e&&e.message)||'')); })
        .saveNotes(JSON.stringify(payload));
    } else {
      _done('');   //  dev fallback
    }
  };

  window._scfSave = function(idx){
    var r = (window.D||[])[idx];
    var msg = document.getElementById('scf-msg');
    var btn = document.getElementById('scf-ok');
    if (!r){ if(msg){msg.style.color='#f87171';msg.textContent='ไม่พบรายการ';} return; }
    if (!_scfCanConfirm(r)){ if(msg){msg.style.color='#f87171';msg.textContent='ยืนยันได้เฉพาะงานของตัวเอง';} return; }

    var mo = parseInt((document.getElementById('scf-mo')||{}).value||0,10);
    var yr = parseInt((document.getElementById('scf-yr')||{}).value||0,10);
    var note = String((document.getElementById('scf-note')||{}).value||'').trim();
    if (!(mo>=1&&mo<=12) || !yr){ if(msg){msg.style.color='#f87171';msg.textContent='เลือกเดือน/ปีให้ถูกต้อง';} return; }

    if (btn){ btn.disabled=true; btn.textContent='กำลังบันทึก...'; }

    //  ── อัปเดต record ในหน่วยความจำ (เหมือน Confirm Billing) ──
    var myId='', myName='';
    try { myId=(window._currentUser&&window._currentUser.empId)||''; myName=(window._currentUser&&window._currentUser.name)||''; } catch(e){}
    if (!r._orig_st) r._orig_st = r.st;
    //  [V525] เก็บเดือนเดิมไว้ (ใช้เป็น key ตอน reload + ใช้คืนค่าตอนถอนยืนยัน)
    if (r._scf_key_mo == null){
      r._scf_key_mo = (r.rbmo != null ? r.rbmo : (r.mo || ''));
      r._scf_key_yr = (r.rbyr != null ? r.rbyr : (r.yr || ''));
    }
    if (r._orig_mo == null){ r._orig_mo = r.mo; r._orig_yr = r.yr; r._orig_fmo = r.fmo; r._orig_fyr = r.fyr; }  // [V529] +fmo

    r.st = 'Backlog (Confirmed)';
    r._confirmed_billing = 1;
    //  [V525] ย้ายเดือนจริง — แก้ทั้ง mo/yr (เดือนหลัก ใช้กรอง/สรุป) และ rbmo/rbyr (รอบบิล)
    r.mo = mo;  r.yr = yr;
    r.rbmo = mo; r.rbyr = yr;
    //  [V529] 🔴 ต้องย้าย fmo/fyr ด้วย — Monthly Forecast อ่าน r.fmo (ไม่ใช่ r.mo)
    //     V525 ลืมจุดนี้ -> รายการโผล่ทั้งเดือนเก่า (fmo) และเดือนใหม่ (mo) = ยอดเกิน
    r.fmo = mo; r.fyr = yr; r.fm = mo; r.fy = yr;
    r._search = null;

    //  ⚠ key ของ salesnotes = qn|month|year  (_applyNotesOverride match ด้วย rbmo/rbyr เดิม)
    //    -> ต้องส่ง "เดือนเดิม" เป็น key ไม่งั้น reload แล้วหาไม่เจอ = สถานะยืนยันหาย
    //    -> เดือนใหม่ฝากไว้ใน note เป็น tag [→M/YYYY] แล้วให้ loadData อ่านกลับ
    var _keyMo = (r._scf_key_mo!=null ? r._scf_key_mo : mo);
    var _keyYr = (r._scf_key_yr!=null ? r._scf_key_yr : yr);
    var _noteTagged = _scfMakeTag(note, mo, yr);

    var payload = [{
      qn: r.qn||r.sr||'', rid: r.qn||r.sr||'', customer: r.cu||'',
      salesId: myId, salesName: myName,
      month: _keyMo, year: _keyYr, note: _noteTagged,
      status: 'Backlog (Confirmed)', ip: r.ip||'', origSt: r._orig_st||''
    }];

    //  [V525] โน้ต = ตัวเดียวกับคอลัมน์ 📝 โน้ต -> เขียนลง quote_notes ด้วย (ไม่ใส่ tag)
    _scfSaveQuoteNote(r.qn||r.sr||'', note, function(){
      try{ if(typeof window._qnLoadNotes==='function') window._qnLoadNotes(); }catch(e){}
    });

    function _after(okTxt, errTxt){
      if (btn){ btn.disabled=false; }
      if (errTxt){
        if (msg){ msg.style.color='#f87171'; msg.textContent=errTxt; }
        if (btn) btn.textContent='\u2705 ยืนยัน';
        return;
      }
      if (msg){ msg.style.color='#4ade80'; msg.textContent=okTxt; }
      setTimeout(function(){
        var ov=document.getElementById('scf-overlay'); if(ov) ov.remove();
        //  re-render หน้าที่เปิดอยู่
        try{ if(typeof window.spRenderOrdSP==='function') window.spRenderOrdSP(); }catch(e){}
        try{ if(typeof window.spRenderOrdSC==='function') window.spRenderOrdSC(); }catch(e){}
        try{ if(typeof window.buildSummary==='function') window.buildSummary(); }catch(e){}
        try{ if(typeof window.af==='function') window.af(); }catch(e){}
      }, 550);
    }

    if (typeof google!=='undefined' && google.script && google.script.run){
      google.script.run
        .withSuccessHandler(function(res){
          try {
            var rr = typeof res==='string' ? JSON.parse(res) : res;
            if (rr && rr.ok) _after('\u2705 บันทึกแล้ว \u2014 ลงเดือน '+MON_TH[mo]+' '+yr);
            else _after('', (rr&&rr.error)||'บันทึกไม่สำเร็จ');
          } catch(e){ _after('', 'บันทึกไม่สำเร็จ'); }
        })
        .withFailureHandler(function(e){ _after('', 'เชื่อมต่อไม่ได้: '+((e&&e.message)||'')); })
        .saveNotes(JSON.stringify(payload));
    } else {
      _after('\u2705 บันทึกแล้ว (local) \u2014 '+MON_TH[mo]+' '+yr);
    }
  };
})();

/* ══════════════════════════════════════════════════════════
   [V562] Config: Parts Status Mapping (สถานะอะไหล่)
   STATUS_DT_NAME -> ordering | pending | skip
   ══════════════════════════════════════════════════════════ */
(function(){
  var GRP = [
    {k:'ordering', n:'Ordering', c:'#4ade80'},
    {k:'pending',  n:'Pending',  c:'#a78bfa'},
    {k:'skip',     n:'Ignore',   c:'#94a3b8'}
  ];
  function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];}); }
  function work(){
    if(!window._psWork){
      window._psWork = {};
      var m = (window._psMap ? window._psMap() : {});
      Object.keys(m).forEach(function(k){ window._psWork[k]=m[k]; });
    }
    return window._psWork;
  }
  function msg(t,c){ var e=document.getElementById('cfg-ps-msg'); if(e){ e.textContent=t||''; e.style.color=c||'var(--mu)'; } }

  /* นับจำนวนจากข้อมูลจริงในเครื่อง */
  function counts(){
    var c = {};
    try{
      (window._jsupParts||[]).forEach(function(p){
        var s = (p && p.STATUS_DT_NAME) || '';
        if(!s) return;
        c[s] = (c[s]||0)+1;
      });
    }catch(e){}
    return c;
  }

  window.cfgPsInit = function(){
    var box = document.getElementById('cfg-ps-body'); if(!box) return;
    var w = work(), cnt = counts();
    var keys = Object.keys(w);
    /* สถานะที่มีในข้อมูลแต่ยังไม่ได้ map */
    var miss = Object.keys(cnt).filter(function(s){ return !w[s]; });
    keys.sort(function(a,b){ return (cnt[b]||0)-(cnt[a]||0) || (a<b?-1:1); });

    var h = '';
    if(miss.length){
      h += '<div style="background:rgba(251,146,60,.10);border:1px solid #fb923c;border-radius:7px;padding:9px 12px;margin-bottom:12px;font-size:12px;color:#fb923c">'
        +  '\u26A0 พบ <b>'+miss.length+'</b> สถานะที่ยังไม่ได้ map (ตกเป็น Data Issue) \u2014 กด <b>\ud83d\udd0d สแกน</b> เพื่อเพิ่ม</div>';
    }
    h += '<div style="border:1px solid var(--bd);border-radius:8px;overflow:hidden">'
      +  '<table style="width:100%;border-collapse:collapse;font-size:12px">'
      +  '<thead><tr style="background:var(--sur2)">'
      +  '<th style="text-align:left;padding:7px 10px;font-weight:700;color:var(--mu2)">สถานะอะไหล่</th>'
      +  '<th style="text-align:left;padding:7px 10px;font-weight:700;color:var(--mu2);width:150px">กลุ่ม</th>'
      +  '<th style="text-align:right;padding:7px 10px;font-weight:700;color:var(--mu2);width:90px">จำนวน</th>'
      +  '<th style="width:40px"></th></tr></thead><tbody>';
    keys.forEach(function(k){
      var g = w[k], n = cnt[k]||0;
      var gc = (GRP.filter(function(x){return x.k===g;})[0]||{}).c || 'var(--mu)';
      h += '<tr style="border-top:1px solid var(--bd)">'
        +  '<td style="padding:5px 10px;color:var(--tx);font-family:var(--mono);font-size:11px">'+esc(k)+'</td>'
        +  '<td style="padding:5px 10px"><select onchange="cfgPsSet(this,\''+esc(k).replace(/'/g,"\\'")+'\')" style="background:var(--sur2);color:'+gc+';border:1px solid var(--bd2);border-radius:4px;padding:3px 6px;font-size:11px;font-family:var(--font);font-weight:700">'
        +  GRP.map(function(x){ return '<option value="'+x.k+'"'+(x.k===g?' selected':'')+'>'+x.n+'</option>'; }).join('')
        +  '</select></td>'
        +  '<td style="padding:5px 10px;text-align:right;color:'+(n?'var(--mu2)':'var(--mu)')+';font-family:var(--mono);font-size:11px">'+(n?n.toLocaleString():'\u2014')+'</td>'
        +  '<td style="padding:5px 10px;text-align:center"><button onclick="cfgPsDel(\''+esc(k).replace(/'/g,"\\'")+'\')" style="background:transparent;border:none;color:#f87171;cursor:pointer;font-size:13px">\u00d7</button></td>'
        +  '</tr>';
    });
    h += '</tbody></table></div>';
    box.innerHTML = h;
  };

  window.cfgPsSet = function(sel, k){ work()[k] = sel.value; window.cfgPsInit(); msg(''); };
  window.cfgPsDel = function(k){ delete work()[k]; window.cfgPsInit(); msg('\ud83d\uddd1 ลบ "'+k+'" \u2014 ยังไม่บันทึก','#fb923c'); };

  window.cfgPsScan = function(){
    var w = work(), cnt = counts();
    var miss = Object.keys(cnt).filter(function(s){ return !w[s]; });
    if(!miss.length){ msg('\u2705 ทุกสถานะในข้อมูล map ครบแล้ว','#4ade80'); return; }
    miss.forEach(function(s){ w[s] = 'pending'; });
    window.cfgPsInit();
    msg('\u2795 เพิ่ม '+miss.length+' สถานะ (ตั้งเป็น Pending ไว้ก่อน) \u2014 ตรวจแล้วกดบันทึก','#fb923c');
  };

  window.cfgPsReset = function(){
    window._psWork = null;
    var d = window._PS_DEFAULT||{};
    window._psWork = {};
    Object.keys(d).forEach(function(k){ window._psWork[k]=d[k]; });
    window.cfgPsInit();
    msg('\u21ba กลับค่าเริ่มต้นแล้ว \u2014 กดบันทึกเพื่อยืนยัน','#fb923c');
  };

  window.cfgPsSave = function(){
    var map = {}, w = work();
    Object.keys(w).forEach(function(k){ if(w[k]) map[k]=w[k]; });
    msg('กำลังบันทึก\u2026');
    try{
      if(typeof google!=='undefined' && google.script && google.script.run){
        google.script.run
          .withSuccessHandler(function(){
            window._PARTS_STATUS = map;
            try{ window._LAST_CONFIG = window._LAST_CONFIG||{}; window._LAST_CONFIG.parts_status = map; }catch(e){}
            msg('\u2705 บันทึกแล้ว \u2014 กด Load Data สดเพื่อให้มีผล','#4ade80');
          })
          .withFailureHandler(function(){
            window._PARTS_STATUS = map;
            msg('\u26a0 เก็บ local (Code.gs ต้อง Deploy New Version)','#fb923c');
          })
          .saveConfigSection(JSON.stringify({section:'parts_status', data:map}));
      } else {
        window._PARTS_STATUS = map;
        msg('\u2705 บันทึกแล้ว (local)','#4ade80');
      }
    }catch(e){ msg('\u26a0 บันทึกไม่ได้: '+(e&&e.message||''),'#f87171'); }
  };
})();
</script>
