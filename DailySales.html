<!-- ═══════════════════════════════════════════════════════════
     DailySales.html — หน้า Daily Sales (เมนูแรก field-tool เซลล์)
     v13 (เจอจุดที่ 2! reset nav default ก็ตั้ง display — แก้แล้ว + [CODE v12] ใน debug) · view ปกติในระบบ (id=v-ds) · ดึง raw จริง
     แทนที่ MobileField overlay เดิม (รื้อทิ้งแล้ว)
     4 แท็บ: 🩺 เร่งด่วน → 🔧 อะไหล่(Stock In only) → 📄 ใบเสนอราคา → 📊 ตัวเลข
     ═══════════════════════════════════════════════════════════ -->
<div class="view" id="v-ds" style="display:none;flex-direction:column;flex:1;overflow:hidden">
<style>
#v-ds{--d-bg:#0f1419;--d-card:#1a212b;--d-card2:#222c38;--d-line:#2c3845;
  --d-tx:#e8edf2;--d-mu:#8a98a8;--d-mu2:#5e6c7a;
  --d-red:#ff5252;--d-orange:#ff9d3c;--d-green:#3ddc84;--d-blue:#4aa3ff;--d-purple:#b07cff;--d-pink:#ff6fae;
  background:var(--d-bg);color:var(--d-tx);font-size:16px;line-height:1.45;
  display:flex;flex-direction:column;overflow:hidden}
#v-ds *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
#v-ds .d-hd{background:linear-gradient(180deg,#141b24,#0f1419);border-bottom:1px solid var(--d-line);
  padding:10px 14px 9px;flex:0 0 auto}
#v-ds .d-htop{display:flex;align-items:center;justify-content:space-between;gap:8px}
#v-ds .d-who{display:flex;align-items:center;gap:9px;min-width:0}
#v-ds .d-av{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#4aa3ff,#b07cff);
  display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;color:#fff;flex:0 0 auto}
#v-ds .d-nm{font-weight:700;font-size:14px;line-height:1.1}
#v-ds .d-rl{font-size:11px;color:var(--d-mu);line-height:1.2}
#v-ds .d-refresh{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--d-tx);
  background:var(--d-card2);border:1px solid var(--d-line);padding:7px 12px;border-radius:20px;cursor:pointer;font-weight:600}
#v-ds .d-search{margin-top:9px;position:relative}
#v-ds .d-search input{width:100%;background:var(--d-card);border:1px solid var(--d-line);border-radius:10px;
  color:var(--d-tx);font-size:15px;padding:10px 12px 10px 36px;outline:none;font-family:inherit}
#v-ds .d-search .ic{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--d-mu);font-size:14px}
#v-ds .d-body{flex:1;overflow-y:auto;padding:8px 14px 18px;-webkit-overflow-scrolling:touch}

#v-ds .d-card{background:var(--d-card);border:1px solid var(--d-line);border-radius:10px;
  padding:9px 13px;margin-bottom:0;cursor:pointer;transition:transform .08s,background .12s}
#v-ds .d-card:hover{background:var(--d-card2)}
#v-ds .d-row{display:flex;align-items:center;gap:12px}
#v-ds .d-rmain{flex:1;min-width:0}
#v-ds .d-rtop{display:flex;align-items:baseline;gap:8px}
#v-ds .d-rcu{font-weight:700;font-size:14.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:230px}
#v-ds .d-rmeta{font-size:12px;color:var(--d-mu);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#v-ds .d-rsub{font-size:11.5px;color:var(--d-mu2);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#v-ds .d-rright{display:flex;align-items:center;gap:10px;flex:0 0 auto}
#v-ds .d-rqn{font-size:11px;color:var(--d-mu2);font-family:ui-monospace,monospace}
/* ST/IP columns (desktop) */
#v-ds .d-rstip{display:none;flex:0 0 auto;gap:14px;text-align:right}
#v-ds .d-rstip .col{display:flex;flex-direction:column;line-height:1.2}
#v-ds .d-rstip .lb{font-size:9px;color:var(--d-mu2);text-transform:uppercase;letter-spacing:.5px}
#v-ds .d-rstip .vl{font-size:12px;font-weight:600}
@media(min-width:821px){#v-ds .d-rstip{display:flex} #v-ds .d-rcu{max-width:320px}}
#v-ds .d-card:active{transform:scale(.985)}
#v-ds .d-card.urgent{border-left:4px solid var(--d-red)}
#v-ds .d-card.warn{border-left:4px solid var(--d-orange)}
#v-ds .d-card.ok{border-left:4px solid var(--d-green)}
#v-ds .d-card.info{border-left:4px solid var(--d-blue)}
#v-ds .d-crow{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
#v-ds .d-cu{font-weight:700;font-size:15.5px;line-height:1.25;letter-spacing:-.2px}
#v-ds .d-meta{font-size:13px;color:var(--d-mu);margin-top:3px}
#v-ds .d-meta b{color:var(--d-tx);font-weight:600}
#v-ds .d-badge{flex:0 0 auto;font-size:11px;font-weight:700;padding:4px 9px;border-radius:8px;white-space:nowrap}
#v-ds .b-red{background:rgba(255,82,82,.14);color:var(--d-red)}
#v-ds .b-orange{background:rgba(255,157,60,.14);color:var(--d-orange)}
#v-ds .b-green{background:rgba(61,220,132,.14);color:var(--d-green)}
#v-ds .b-blue{background:rgba(74,163,255,.14);color:var(--d-blue)}
#v-ds .b-gray{background:#2a3441;color:var(--d-mu)}
#v-ds .d-cbot{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-top:11px}
#v-ds .d-pills{display:flex;gap:6px;flex-wrap:wrap}
#v-ds .d-pill{font-size:11.5px;color:var(--d-mu);background:var(--d-card2);padding:4px 8px;border-radius:7px}
#v-ds .d-pill .em{color:var(--d-tx);font-weight:600}
#v-ds .d-qn{font-size:11px;color:var(--d-mu2);font-family:ui-monospace,monospace}
#v-ds .d-sec{font-size:12px;font-weight:700;color:var(--d-mu);text-transform:uppercase;
  letter-spacing:.6px;margin:14px 2px 8px;display:flex;align-items:center;gap:7px}
#v-ds .d-sec.first{margin-top:4px}
#v-ds .d-sec .n{background:var(--d-card2);color:var(--d-tx);padding:1px 8px;border-radius:20px;font-size:11px}
#v-ds .d-hint{font-size:12px;color:var(--d-mu2);text-align:center;padding:14px;background:var(--d-card);
  border:1px dashed var(--d-line);border-radius:12px;margin-top:6px}
#v-ds .d-empty{text-align:center;color:var(--d-mu);padding:46px 20px;font-size:14px}
#v-ds .d-empty .e-ic{font-size:38px;margin-bottom:10px;opacity:.5}

#v-ds .d-hero{background:linear-gradient(135deg,#1d2733,#161e28);border:1px solid var(--d-line);
  border-radius:18px;padding:17px 16px;margin-bottom:12px;position:relative;overflow:hidden}
#v-ds .d-hlbl{font-size:12px;color:var(--d-mu);font-weight:600;letter-spacing:.4px}
#v-ds .d-hbig{font-size:36px;font-weight:800;letter-spacing:-1.4px;margin:2px 0 1px;line-height:1}
#v-ds .d-hunit{font-size:17px;color:var(--d-mu);font-weight:600}
#v-ds .d-hsub{font-size:13px;color:var(--d-mu);margin-top:6px}
#v-ds .d-mlbl{font-size:12px;color:var(--d-mu);font-weight:600}
#v-ds .d-picker{display:flex;gap:7px;overflow-x:auto;padding:2px 0 10px}
#v-ds .d-picker::-webkit-scrollbar{display:none}
#v-ds .d-chip{flex:0 0 auto;font-size:13px;font-weight:600;padding:7px 14px;border-radius:20px;
  background:var(--d-card);border:1px solid var(--d-line);color:var(--d-mu);cursor:pointer}
#v-ds .d-chip.on{background:var(--d-blue);border-color:var(--d-blue);color:#fff}

#v-ds .d-nav{flex:0 0 auto;background:rgba(20,27,36,.97);border-top:1px solid var(--d-line);
  display:flex;padding:5px 4px}
#v-ds .d-nb{flex:1;background:none;border:none;color:var(--d-mu2);display:flex;flex-direction:column;
  align-items:center;gap:3px;padding:6px 2px;cursor:pointer;position:relative;font-family:inherit}
#v-ds .d-nb .ic{font-size:20px;line-height:1}
#v-ds .d-nb .tx{font-size:10.5px;font-weight:600}
#v-ds .d-nb.on{color:var(--d-blue)}
#v-ds .d-nb .cnt{position:absolute;top:1px;right:50%;margin-right:-22px;background:var(--d-red);color:#fff;
  font-size:9.5px;font-weight:700;min-width:16px;height:16px;border-radius:9px;padding:0 4px;
  display:none;align-items:center;justify-content:center}

#v-ds .d-sbg{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:1600;opacity:0;
  pointer-events:none;transition:opacity .2s}
#v-ds .d-sbg.on{opacity:1;pointer-events:auto}
#v-ds .d-sheet{position:fixed;left:0;right:0;bottom:0;z-index:1601;background:var(--d-card);
  border-radius:20px 20px 0 0;border-top:1px solid var(--d-line);transform:translateY(100%);
  transition:transform .25s cubic-bezier(.4,0,.2,1);max-height:86vh;overflow-y:auto;
  padding:0 0 calc(20px + env(safe-area-inset-bottom))}
#v-ds .d-sheet.on{transform:translateY(0)}
#v-ds .d-grab{width:38px;height:4px;background:var(--d-line);border-radius:3px;margin:10px auto 4px}
#v-ds .d-sh{padding:6px 18px 14px;border-bottom:1px solid var(--d-line)}
#v-ds .d-scu{font-size:19px;font-weight:800;letter-spacing:-.3px}
#v-ds .d-ssub{font-size:13px;color:var(--d-mu);margin-top:3px}
#v-ds .d-sb{padding:15px 18px}
#v-ds .d-kv{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--d-line);font-size:14px;gap:12px}
#v-ds .d-kv .k{color:var(--d-mu);flex:0 0 auto}
#v-ds .d-kv .v{font-weight:600;text-align:right}
#v-ds .d-tl{position:relative;padding-left:26px;margin-top:6px}
#v-ds .d-tl::before{content:'';position:absolute;left:8px;top:6px;bottom:10px;width:2px;background:var(--d-line)}
#v-ds .d-ti{position:relative;padding-bottom:15px}
#v-ds .d-ti::before{content:'';position:absolute;left:-22px;top:4px;width:11px;height:11px;border-radius:50%;
  background:var(--d-card);border:2px solid var(--d-mu2)}
#v-ds .d-ti.done::before{background:var(--d-green);border-color:var(--d-green)}
#v-ds .d-ti.now::before{background:var(--d-orange);border-color:var(--d-orange);box-shadow:0 0 0 4px rgba(255,157,60,.14)}
#v-ds .d-tt{font-size:14px;font-weight:600}
#v-ds .d-td{font-size:12px;color:var(--d-mu);margin-top:1px}
#v-ds .d-ti.pending .d-tt{color:var(--d-mu2)}
#v-ds .d-acts{display:flex;gap:9px;padding:4px 18px 0}
#v-ds .d-act{flex:1;text-align:center;font-size:14px;font-weight:700;padding:13px;border-radius:12px;
  border:none;cursor:pointer;color:#fff;font-family:inherit}
#v-ds .d-mail{background:var(--d-blue)}
#v-ds .d-do{display:block;width:100%;text-align:left;background:var(--d-card2);border:1px solid var(--d-line);
  border-radius:13px;padding:15px 16px;margin-bottom:11px;cursor:pointer;color:var(--d-tx);font-family:inherit}
#v-ds .d-dot{font-size:16px;font-weight:700}
#v-ds .d-dod{font-size:12.5px;color:var(--d-mu);margin-top:3px;line-height:1.4}
#v-ds .d-notebox{background:var(--d-card2);border-radius:11px;padding:12px;margin-top:12px;font-size:14px;line-height:1.5}
#v-ds .d-item{background:var(--d-card2);border:1px solid var(--d-line);border-radius:10px;padding:10px 12px;margin-bottom:8px}
#v-ds .d-itop{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
#v-ds .d-iname{font-size:14px;font-weight:600;line-height:1.3}
#v-ds .d-istat{font-size:12px;font-weight:700;white-space:nowrap;flex:0 0 auto}
#v-ds .d-isub{font-size:12px;color:var(--d-mu);margin-top:3px}
#v-ds .d-pickwrap{padding:6px 18px 4px}
#v-ds .d-picklbl{font-size:12px;color:var(--d-mu);margin:4px 2px 12px;font-weight:600}

/* ═══ DESKTOP (≥821px): nav บน + การ์ด grid หลายคอลัมน์ ═══ */
@media(min-width:821px){
  #v-ds{width:100%;border-left:1px solid var(--d-line);border-right:1px solid var(--d-line)}
  /* nav ย้ายขึ้นบน (เหนือ body) */
  #v-ds{display:flex;flex-direction:column}
  #v-ds .d-nav{order:-1;border-top:none;border-bottom:1px solid var(--d-line);
    justify-content:center;gap:6px;padding:8px 14px;background:transparent}
  #v-ds .d-nb{flex:0 0 auto;flex-direction:row;gap:7px;padding:9px 18px;border-radius:10px;
    border:1px solid transparent}
  #v-ds .d-nb.on{background:rgba(74,163,255,.12);border-color:rgba(74,163,255,.3)}
  #v-ds .d-nb .ic{font-size:17px}
  #v-ds .d-nb .tx{font-size:13px}
  #v-ds .d-nb .cnt{position:static;margin:0 0 0 2px}
  /* body: การ์ด grid 2 คอลัมน์ */
  #v-ds .d-body{padding:12px 28px 20px}
  #v-ds .d-cardgrid{display:flex;flex-direction:column;gap:7px}
  #v-ds .d-sec{grid-column:1/-1}
  #v-ds .d-hint{grid-column:1/-1}
  #v-ds .d-card{margin-bottom:0}
  /* hero/number tab อยู่กลาง ไม่ต้อง grid */
  #v-ds .d-hero,#v-ds .d-picker{max-width:760px;margin-left:auto;margin-right:auto}
  /* sheet → กลางจอเหมือน modal (ไม่ติดล่าง) */
  #v-ds .d-sheet{left:50%;right:auto;bottom:auto;top:50%;transform:translate(-50%,-46%) scale(.98);
    width:460px;max-width:92vw;max-height:84vh;border-radius:16px;border:1px solid var(--d-line);opacity:0}
  #v-ds .d-sheet.on{transform:translate(-50%,-50%) scale(1);opacity:1}
  #v-ds .d-grab{display:none}
}

</style>

    <div class="d-htop">
      <div class="d-who">

<script>
/* ═══════════ Daily Sales — logic (ข้อมูลจริง) ═══════════ */
(function(){
'use strict';
var TAB='mon', SEARCH='', PICK=null, _rendered=false;

function $(id){return document.getElementById(id);}
function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,function(c){
  return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});}
var _REG=[]; function reg(o){ _REG.push(o); return _REG.length-1; } function unreg(i){ return _REG[+i]; }
function pd(s){if(!s)return null;var t=String(s).slice(0,10);var m=t.match(/(\d{4})-(\d{2})-(\d{2})/);
  if(!m)return null;return new Date(+m[1],+m[2]-1,+m[3]);}
function daysTo(s){var d=pd(s);if(!d)return null;var n=new Date();n.setHours(0,0,0,0);return Math.round((d-n)/86400000);}
function fB(n){n=+n||0;return '฿'+Math.round(n).toLocaleString('th-TH');}
function fMM(n){return (Math.round((+n||0)/1e4)/100).toFixed(2);}
function role(){try{return window._USER_ROLE||(window._currentUser&&window._currentUser.role)||'admin';}catch(e){return 'admin';}}
function isSales(){return role()==='sales';}
function myName(){try{return window._SALES_LOCK||(window._currentUser&&window._currentUser.name)||'';}catch(e){return '';}}
function salesList(){var set={};
  (window._jsupSC||[]).forEach(function(r){if(r.SALES_SERVICE_NAME)set[r.SALES_SERVICE_NAME]=1;});
  (window._jsupParts||[]).forEach(function(r){if(r.SALES_SERVICE_NAME)set[r.SALES_SERVICE_NAME]=1;});
  (window._jsupQuo||[]).forEach(function(r){if(r.SALES_SERVICE_NAME)set[r.SALES_SERVICE_NAME]=1;});
  return Object.keys(set).filter(function(x){return x&&x.trim();}).sort();}
function activeSa(){if(isSales())return myName();return PICK||myName()||(salesList()[0]||'');}
function saMatch(rowSa,t){if(!t)return true;if(!rowSa)return false;
  return String(rowSa).indexOf(t)>=0||String(t).indexOf(rowSa)>=0;}
function match(){var a=Array.prototype.slice.call(arguments);if(!SEARCH)return true;
  return a.join(' ').toLowerCase().indexOf(SEARCH)>=0;}
var THMO=['','ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
function thDate(s){var d=pd(s);if(!d)return String(s||'').slice(0,10);
  return d.getDate()+' '+THMO[d.getMonth()+1]+' '+(d.getFullYear()+543).toString().slice(2);}

/* ── 1) เร่งด่วน ── RAW_CONTRACT ── */
function dataMon(){
  var rows=window._jsupContract||[]; var tgt=isSales()?myName():(PICK||null); var out=[];
  rows.forEach(function(r){
    var dt=daysTo(r.CONTRACT_END_DATE); if(dt==null||dt<0||dt>45)return;
    var owner=r.CON_OWNER_NEW||r.SALES_NAME_CH||r.SALES_NAME_DT||'';
    if(tgt&&!saMatch(owner,tgt))return;
    out.push({cu:r.CUSTOMER_NAME||'—',brand:r.BRAND||'',model:r.Model||r.PRODUCT_NAME||'',
      sn:r.SERAIL_NUMBER||'',end:r.CONTRACT_END_DATE,days:dt,
      noQuo:!!r.con_trigger_do_create_quotation,conNo:r.CONTRACT_NO||'',
      lvl:dt<=15?'urgent':dt<=30?'warn':'info'});
  });
  out.sort(function(a,b){return a.days-b.days;}); return out;
}
function rMon(){
  var rows=dataMon().filter(function(r){return match(r.cu,r.brand,r.model,r.sn);});
  setCnt('ds-cMon',rows.filter(function(r){return r.lvl==='urgent';}).length);
  if(!rows.length)return empty('🩺','ไม่มีเครื่องใกล้หมดสัญญา (45 วัน)');
  var urg=rows.filter(function(r){return r.lvl==='urgent';});
  var rest=rows.filter(function(r){return r.lvl!=='urgent';}); var h='';
  if(urg.length)h+='<div class="d-sec first">⚠️ ต้องรีบ <span class="n">'+urg.length+'</span></div>'+urg.map(cardMon).join('');
  if(rest.length)h+='<div class="d-sec">เฝ้าระวัง <span class="n">'+rest.length+'</span></div>'+rest.map(cardMon).join('');
  return h;
}
function cardMon(r){var bd=r.days<=15?'b-red':r.days<=30?'b-orange':'b-blue';
  return '<div class="d-card '+r.lvl+'" onclick="dsOpenMon('+reg(r)+')">'+
    '<div class="d-row"><div class="d-rmain">'+
    '<div class="d-rtop"><span class="d-rcu">'+esc(r.cu)+'</span>'+
    '<span class="d-rmeta">'+esc(r.brand)+' '+esc(r.model)+'</span></div>'+
    '<div class="d-rsub">'+(r.sn?'S/N '+esc(r.sn)+' \u00b7 ':'')+'\u0e2b\u0e21\u0e14 '+esc(thDate(r.end))+(r.noQuo?' \u00b7 \u0e22\u0e31\u0e07\u0e44\u0e21\u0e48\u0e40\u0e2a\u0e19\u0e2d\u0e15\u0e48\u0e2d':'')+'</div></div>'+
